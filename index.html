<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>神明小岛 · Deus Isle</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0e1a;
    font-family:"PingFang SC","Microsoft YaHei","Source Han Sans SC",system-ui,sans-serif;
    user-select:none; -webkit-user-select:none; }
  #stage { position:fixed; inset:0; }
  #stage canvas { display:block; }

  /* ---------- HUD 通用 ---------- */
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; }
  #ui > * { pointer-events:auto; }
  .glass { background:rgba(12,16,32,.62); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.12); border-radius:16px;
    box-shadow:0 8px 32px rgba(0,0,0,.35); }

  /* ---------- 顶栏 ---------- */
  #topbar { position:absolute; top:12px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px; padding:8px 14px; max-width:96vw; flex-wrap:wrap; justify-content:center; }
  #era-badge { display:flex; align-items:center; gap:8px; padding-right:12px; border-right:1px solid rgba(255,255,255,.15); }
  #era-icon { font-size:26px; filter:drop-shadow(0 0 6px rgba(255,220,120,.6)); }
  #era-name { color:#ffe9b0; font-weight:700; font-size:14px; letter-spacing:1px; white-space:nowrap; }
  #era-sub { color:rgba(255,255,255,.5); font-size:10px; letter-spacing:2px; }
  .res { display:flex; align-items:center; gap:4px; color:#fff; font-size:13px; font-weight:600;
    padding:4px 8px; border-radius:10px; background:rgba(255,255,255,.06); white-space:nowrap; }
  .res span { min-width:24px; text-align:right; font-variant-numeric:tabular-nums; }
  .res.flash { animation:resFlash .5s; }
  @keyframes resFlash { 0%{ background:rgba(255,220,120,.55);} 100%{ background:rgba(255,255,255,.06);} }
  #clock { font-size:18px; width:34px; text-align:center; }
  .icon-btn { width:34px; height:34px; border-radius:10px; border:1px solid rgba(255,255,255,.15);
    background:rgba(255,255,255,.08); color:#fff; font-size:16px; cursor:pointer; transition:.2s; }
  .icon-btn:hover { background:rgba(255,255,255,.2); transform:translateY(-1px); }

  /* ---------- 底栏 ---------- */
  #bottombar { position:absolute; left:50%; transform:translateX(-50%); bottom:12px;
    display:flex; gap:10px; align-items:stretch; max-width:97vw; }
  #build-dock { display:flex; gap:8px; padding:10px; align-items:center; overflow-x:auto; max-width:62vw; }
  #build-dock::-webkit-scrollbar { height:4px; } #build-dock::-webkit-scrollbar-thumb { background:rgba(255,255,255,.2); border-radius:2px; }
  .b-card { flex:0 0 auto; width:74px; padding:8px 4px 6px; border-radius:12px; text-align:center; cursor:pointer;
    background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.1); transition:.18s; position:relative; }
  .b-card:hover { background:rgba(255,255,255,.16); transform:translateY(-3px); }
  .b-card.sel { background:rgba(120,200,255,.25); border-color:#7ad0ff; box-shadow:0 0 14px rgba(120,200,255,.5); }
  .b-card.poor { opacity:.38; filter:grayscale(.6); }
  .b-icon { font-size:24px; }
  .b-name { color:#fff; font-size:11px; font-weight:600; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .b-cost { color:#ffd98a; font-size:9px; margin-top:1px; white-space:nowrap; }
  #side-dock { display:flex; flex-direction:column; gap:8px; padding:10px; }
  #god-dock { display:flex; gap:6px; }
  .god-btn { flex:1; min-width:52px; padding:6px 2px; border-radius:10px; border:1px solid rgba(180,140,255,.35);
    background:linear-gradient(160deg,rgba(120,80,220,.35),rgba(60,30,120,.35)); color:#e8dcff;
    font-size:11px; cursor:pointer; text-align:center; transition:.18s; position:relative; overflow:hidden; }
  .god-btn:hover:not(.cd):not(.poor) { transform:translateY(-2px); box-shadow:0 0 12px rgba(160,120,255,.5); }
  .god-btn.poor { opacity:.4; filter:grayscale(.7); cursor:not-allowed; }
  .god-btn.cd { cursor:not-allowed; }
  .god-btn .cdmask { position:absolute; inset:0; background:rgba(0,0,0,.55); transform-origin:bottom; }
  .god-btn b { display:block; font-size:16px; }
  .act-btn { border:none; border-radius:12px; padding:8px 14px; font-size:13px; font-weight:700; cursor:pointer;
    color:#1a1405; background:linear-gradient(135deg,#ffd76a,#ff9a3c); transition:.2s; letter-spacing:1px; }
  .act-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,170,60,.45); }
  .act-btn:disabled { filter:grayscale(.85); opacity:.5; cursor:not-allowed; }
  #btn-eraup { background:linear-gradient(135deg,#8affc1,#3cd6a0); }
  #btn-eraup.ready { animation:pulseGlow 1.4s infinite; }
  #btn-eraup small { display:block; font-size:9px; font-weight:500; opacity:.75; margin-top:2px; letter-spacing:0; }
  @keyframes pulseGlow { 0%,100%{ box-shadow:0 0 8px rgba(120,255,190,.4);} 50%{ box-shadow:0 0 24px rgba(120,255,190,.95);} }
  .btn-launch { background:linear-gradient(135deg,#ff8a8a,#d63c3c) !important; color:#fff !important; animation:pulseGlowR 1.2s infinite; }
  @keyframes pulseGlowR { 0%,100%{ box-shadow:0 0 10px rgba(255,100,100,.5);} 50%{ box-shadow:0 0 30px rgba(255,80,80,1);} }

  /* ---------- 提示/祈祷/飘字 ---------- */
  #toasts { position:absolute; top:70px; right:14px; display:flex; flex-direction:column; gap:8px; pointer-events:none !important; }
  .toast { padding:10px 16px; border-radius:12px; color:#fff; font-size:13px; font-weight:600;
    background:rgba(15,20,40,.85); border:1px solid rgba(255,255,255,.15); border-left:4px solid #ffd76a;
    animation:toastIn .4s cubic-bezier(.2,1.4,.4,1); max-width:280px; box-shadow:0 6px 20px rgba(0,0,0,.4); }
  .toast.out { animation:toastOut .4s forwards; }
  @keyframes toastIn { from{ transform:translateX(120%); opacity:0;} to{ transform:none; opacity:1;} }
  @keyframes toastOut { to{ transform:translateX(120%); opacity:0;} }
  #prayers { position:absolute; inset:0; pointer-events:none !important; }
  .prayer { position:absolute; transform:translate(-50%,-110%); cursor:pointer; pointer-events:auto !important;
    background:linear-gradient(160deg,#fff8e8,#ffe9b8); color:#5a4410; font-size:12px; font-weight:700;
    padding:7px 12px; border-radius:14px; white-space:nowrap; animation:prayBob 2s ease-in-out infinite;
    box-shadow:0 4px 14px rgba(0,0,0,.3); border:1.5px solid #d9b25a; }
  .prayer::after { content:""; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%);
    border:7px solid transparent; border-top-color:#ffe9b8; border-bottom:none; }
  .prayer:hover { filter:brightness(1.1); }
  @keyframes prayBob { 0%,100%{ margin-top:0;} 50%{ margin-top:-7px;} }
  .floater { position:absolute; transform:translate(-50%,-50%); font-size:13px; font-weight:800; pointer-events:none !important;
    text-shadow:0 2px 4px rgba(0,0,0,.6); animation:floatUp 1.4s ease-out forwards; }
  @keyframes floatUp { 0%{ opacity:0; margin-top:6px;} 15%{ opacity:1;} 100%{ opacity:0; margin-top:-44px;} }

  .overlay { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;

  .overlay.hidden { opacity:0; pointer-events:none; }
  #overlay-intro h1 { font-size:min(64px,11vw); color:#ffe9b0; letter-spacing:14px; font-weight:900;

  @keyframes titleFloat { 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-10px);} }
  #overlay-intro .sub { color:#8ad0ff; letter-spacing:8px; font-size:14px; margin-top:6px; }
  #overlay-intro .desc { color:rgba(255,255,255,.82); font-size:15px; margin:26px 0 8px; text-align:center; line-height:1.9; }
  #overlay-intro .tips { color:rgba(255,255,255,.45); font-size:12px; line-height:2; text-align:center; margin-bottom:28px; }
  .big-btn { border:none; border-radius:999px; padding:16px 54px; font-size:19px; font-weight:900; letter-spacing:6px;
    color:#24160a; background:linear-gradient(135deg,#ffe9a0,#ffb84d); cursor:pointer; transition:.25s;
    box-shadow:0 0 34px rgba(255,190,80,.45); }
  .big-btn:hover { transform:scale(1.06); box-shadow:0 0 54px rgba(255,190,80,.8); }

  #overlay-era { pointer-events:none; background:radial-gradient(ellipse at center,rgba(20,26,50,.25),rgba(5,8,18,.75)); }
  #era-anim { text-align:center; opacity:0; }

  #era-anim-title { font-size:min(72px,12vw); font-weight:900; color:#fff; letter-spacing:22px;
    text-shadow:0 0 60px rgba(140,200,255,.9); }
  #era-anim-sub { font-size:16px; color:#9fd0ff; letter-spacing:10px; margin-top:14px; }

  #overlay-victory h1 { font-size:min(52px,9vw); color:#ffd0d0; letter-spacing:10px; font-weight:900;
    text-shadow:0 0 50px rgba(255,120,120,.8); }
  #v-stats { display:flex; gap:26px; margin:30px 0 34px; flex-wrap:wrap; justify-content:center; }
  .v-stat { text-align:center; } .v-stat b { display:block; font-size:34px; color:#ffe9b0; }
  .v-stat span { color:rgba(255,255,255,.55); font-size:12px; letter-spacing:2px; }

  /* 电影黑边 */
  .lb { position:fixed; left:0; right:0; height:0; background:#000; z-index:40; transition:height .9s cubic-bezier(.6,0,.3,1); }
  .lb.top { top:0; } .lb.bot { bottom:0; }
  body.cine .lb { height:9vh; }

  @media (max-width:820px) {
    #build-dock { max-width:58vw; } .b-card { width:62px; } .b-name { font-size:10px; }
    #topbar { gap:6px; padding:6px 8px; } .res { font-size:11px; padding:3px 5px; }
  }
</style>

<script type="module">
import * as THREE from './vendor/three.module.js';
import { OrbitControls } from './vendor/OrbitControls.js';

/* ================= 工具 ================= */
const rand=(a=1,b)=> b===undefined? Math.random()*a : a+Math.random()*(b-a);
const randi=(a,b)=> Math.floor(rand(a,b+1));
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const V3=(x=0,y=0,z=0)=>new THREE.Vector3(x,y,z);
const $=id=>document.getElementById(id);

/* 补间动画 */
const tweens=[];
function tw(dur,fn,ease=t=>t,done){ tweens.push({t:0,dur,fn,ease,done}); }
const easeOutBack=t=>{const c=1.7;t-=1;return 1+t*t*((c+1)*t+c);};
const easeIn=t=>t*t*t;
function updateTweens(dt){
  for(let i=tweens.length-1;i>=0;i--){ const w=tweens[i]; w.t+=dt;
    const k=clamp(w.t/w.dur,0,1); w.fn(w.ease(k));
    if(k>=1){ tweens.splice(i,1); w.done&&w.done(); } }
}

/* ================= 音效（极简合成） ================= */
let AC=null, muted=false;
function ac(){ if(!AC) AC=new (window.AudioContext||window.webkitAudioContext)(); return AC; }
function beep(f,dur=.15,type='sine',vol=.18,delay=0,slide=0){
  if(muted) return; try{
    const a=ac(),o=a.createOscillator(),g=a.createGain();
    o.type=type; o.frequency.value=f;
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,f+slide),a.currentTime+delay+dur);
    g.gain.setValueAtTime(0,a.currentTime+delay);
    g.gain.linearRampToValueAtTime(vol,a.currentTime+delay+.015);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+delay+dur);
    o.connect(g).connect(a.destination); o.start(a.currentTime+delay); o.stop(a.currentTime+delay+dur+.05);
  }catch(e){}
}
const sfx={
  build(){ beep(300,.12,'triangle',.22,0,180); beep(520,.1,'sine',.14,.07); },
  faith(){ beep(880,.25,'sine',.12); beep(1320,.3,'sine',.08,.08); },
  error(){ beep(160,.18,'square',.12,0,-60); },
  click(){ beep(660,.05,'sine',.08); },
  miracle(){ beep(220,.5,'sawtooth',.1,0,660); beep(1100,.6,'sine',.1,.15,440); },
  boom(){ beep(90,.5,'sawtooth',.3,0,-55); beep(50,.7,'triangle',.3,.05,-25); },
  era(){ [523,659,784,1046,1318].forEach((f,i)=>beep(f,.4,'triangle',.16,i*.13)); },
  pop(){ beep(740,.07,'sine',.1,0,240); },
  launch(){ beep(60,2.2,'sawtooth',.25,0,140); beep(120,2.0,'triangle',.15,.3,260); },
};
$('btn-mute').onclick=()=>{ muted=!muted; $('btn-mute').textContent=muted?'🔇':'🔊'; };

/* ================= 时代数据 ================= */
const ERAS=[
 {name:'远古时期',   icon:'🔥', sky:0xaee2ff, night:0x0a1030, dusk:0xffb27a, fog:0xaee2ff, water:0x2f8fd0, grass:0x7ec850, sand:0xf0dfb0, rock:0x8a7f6a, leaf:0x4f9e3f, sun:0xfff2d8},
 {name:'古典时代',   icon:'🏺', sky:0xb8d8f0, night:0x0c1236, dusk:0xff9a5a, fog:0xc8d8e8, water:0x2aa5c9, grass:0xa8bf62, sand:0xe8d29a, rock:0xa89a7a, leaf:0x7a9e4a, sun:0xffe8c0},
 {name:'中世纪',     icon:'🏮', sky:0xcfe8e0, night:0x0a1430, dusk:0xff9a7a, fog:0xd0e8e0, water:0x3a9db8, grass:0x6fbf63, sand:0xe0d0a0, rock:0x7a8a7a, leaf:0x3f8e4f, sun:0xfff0d0},
 {name:'工业时代',   icon:'🏭', sky:0xc2c2b2, night:0x0c0e24, dusk:0xe88a5a, fog:0xc2bcae, water:0x3d7f8e, grass:0x7da05a, sand:0xcfc0a0, rock:0x6a6a6a, leaf:0x5a7a42, sun:0xf0e0c0},
 {name:'现代',       icon:'🏙️', sky:0x9fd4ff, night:0x081028, dusk:0xff9a8a, fog:0xa8d4f0, water:0x2f8fd0, grass:0x69b868, sand:0xf0e0b0, rock:0x8a8a8a, leaf:0x4aa050, sun:0xfff4e0},
 {name:'未来纪元',   icon:'🌐', sky:0xa8b8f0, night:0x0a0e30, dusk:0xc88aff, fog:0xb0bcec, water:0x30c0e0, grass:0x5ac8a0, sand:0xd0e0e8, rock:0x7a8aa0, leaf:0x3fc0a0, sun:0xe0f0ff},
 {name:'太空时代',   icon:'🚀', sky:0x3a4a80, night:0x05081c, dusk:0x8a6ad0, fog:0x44508a, water:0x1a4a80, grass:0x4a8a78, sand:0xb0c0d0, rock:0x5a6a8a, leaf:0x3a8a80, sun:0xc0d8ff},
];
const ERA_TITLE_SUB=['钻木取火 · 文明初啼','金字塔下 · 众神之国','青瓦飞檐 · 礼乐之邦','蒸汽轰鸣 · 钢铁洪流','霓虹闪烁 · 摩天丛林','量子之光 · 生态穹顶','星辰大海 · 方舟起航'];
/* 建筑配色（墙/顶/点缀） */
const BC=[
 {wall:0xb08a5a,roof:0x8a6238,acc:0xe0c890},{wall:0xeadfc2,roof:0xc9a86a,acc:0x3a6ea5},
 {wall:0x9a5a3a,roof:0x3a3f4a,acc:0xd43a2a},{wall:0x8a4a3a,roof:0x484850,acc:0x8a9aaa},

 {wall:0xc8d2e4,roof:0x1a2a4a,acc:0x8aaaff},
];
/* 建筑目录：cost=[木,金,信仰] */
const CATALOG=[
 {t:'house', icon:'🛖', cost:[20,0,0],  names:['茅屋','泥砖屋','中式瓦房','砖石里弄','公寓楼','生态居所','失重舱居'], tip:'住房 · 人口容量+4'},
 {t:'farm',  icon:'🌾', cost:[15,0,0],  names:['采集地','灌溉农田','梯田','机械化农场','都市农场','垂直农场','水培穹舱'], tip:'生产食物'},
 {t:'wood',  icon:'🪵', cost:[10,0,0],  names:['伐木场','采木工坊','林场','锯木厂','建材站','合成材料坊','物质打印站'], tip:'生产木材'},
 {t:'market',icon:'🏪', cost:[25,10,0], names:['以物易市','绿洲集市','古代市集','百货商号','购物中心','全息商城','星际交易所'], tip:'产出金币 · 幸福+2'},

/* --- 随机地形核心：种子 + 高度场 + 不规则岸线 + 填海地块 --- */
let SEED=rand(1000);
let PATCHES=[];
function initPatches(){ // 3 块待填海的不规则陆地，位置由种子决定
  PATCHES=[0,1,2].map(i=>({ ang: SEED*.7+i*2.2+((SEED*(i+3))%1)*.9, dist: 13.2, r: 4.6+i*1.1, owned:false }));
}

const R=()=>13;                              // 主岛基准半径
const maxCell=()=>Math.ceil((R()+8)/CELL);
const cellKey=(x,z)=>x+','+z;
function hnoise(x,z){ return Math.sin(x*.32+SEED)*Math.cos(z*.29+SEED*1.7)+.55*Math.sin(x*.74+SEED*2.3)*Math.sin(z*.68+SEED*.9); }
function outlineR(a){ return (R()-1.6)*(1+.13*Math.sin(3*a+SEED)+.09*Math.sin(5*a+SEED*2.1)+.06*Math.sin(8*a+SEED*3.7)); }
function patchR(p,a){ return p.r*(1+.16*Math.sin(4*a+SEED+p.ang)+.08*Math.sin(7*a+SEED*2+p.ang)); }
function landH(x,z){                          // 世界坐标 -> 地面高度（<0 为海）
  let best=-1;
  const d=Math.hypot(x,z), a=Math.atan2(z,x), ro=outlineR(a);
  if(d<ro){ const fall=smooth(ro,ro-2.8,d); best=fall*(1.05+hnoise(x,z)*.85); }
  for(const p of PATCHES){ if(!p.owned) continue;
    const px=Math.cos(p.ang)*p.dist, pz=Math.sin(p.ang)*p.dist;
    const dd=Math.hypot(x-px,z-pz), aa=Math.atan2(z-pz,x-px), pr=patchR(p,aa);
    if(dd<pr){ const fall=smooth(pr,pr-2,dd); best=Math.max(best, fall*(.85+hnoise(x+40,z-30)*.4)); } }
  return best;
}
const walkable=(x,z)=>landH(x*CELL,z*CELL)>0.5;
const cellY=(x,z)=>Math.max(0,landH(x*CELL,z*CELL));
function findCellNear(cx0,cz0){               // 螺旋搜索最近的可建空地
  for(let r=0;r<8;r++) for(let dx=-r;dx<=r;dx++) for(let dz=-r;dz<=r;dz++){
    if(Math.max(Math.abs(dx),Math.abs(dz))!==r) continue;
    const x=cx0+dx, z=cz0+dz;
    if(walkable(x,z)&&!S.cells.has(cellKey(x,z))) return {x,z};
  }
  return null;
}

let terrainMeshes=[], skirtMeshes=[], foamMeshes=[];
function buildTopGrid(cx,cz,size,res){
  const seg=Math.ceil(size/res);
  const geo=new THREE.PlaneGeometry(size,size,seg,seg);
  geo.rotateX(-Math.PI/2);
  const pos=geo.attributes.position, n=pos.count;
  const colors=new Float32Array(n*3), zones=new Uint8Array(n), jit=new Float32Array(n);
  for(let i=0;i<n;i++){
    const h=landH(pos.getX(i)+cx, pos.getZ(i)+cz);
    pos.setY(i, h<0? -0.6 : h);
    zones[i]= h<0.55?0 : h>1.85?2 : 1;   // 0 沙滩 1 草地 2 岩石
    jit[i]=rand(.88,1.06);
  }
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  geo.computeVertexNormals();
  const m=new THREE.Mesh(geo,terrainMat);
  m.receiveShadow=true; m.castShadow=true;
  m.position.set(cx,0,cz);
  m.userData.zones=zones; m.userData.jit=jit;
  return m;
}
function ringStrip(rTop,rBot,yTop,yBot,mat,shadow){
  const N=64, verts=[];
  for(let i=0;i<=N;i++){ const a=i/N*Math.PI*2;
    verts.push(Math.cos(a)*rTop(a),yTop,Math.sin(a)*rTop(a));
    verts.push(Math.cos(a)*rBot(a),yBot,Math.sin(a)*rBot(a)); }
  const idx=[];
  for(let i=0;i<N;i++){ const a=i*2; idx.push(a,a+1,a+2, a+1,a+3,a+2); }
  const g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.Float32BufferAttribute(verts,3));
  g.setIndex(idx); g.computeVertexNormals();
  const m=new THREE.Mesh(g,mat); if(shadow)m.castShadow=true; return m;
}
const _zc=[new THREE.Color(),new THREE.Color(),new THREE.Color()];
function recolorTerrain(){
  _zc[0].copy(PAL.sand); _zc[1].copy(PAL.grass); _zc[2].copy(PAL.rock);
  for(const m of terrainMeshes){
    const zones=m.userData.zones, jit=m.userData.jit, col=m.geometry.attributes.color;
    for(let i=0;i<zones.length;i++){ const z=zones[i],j=jit[i];
      col.setXYZ(i,_zc[z].r*j,_zc[z].g*j,_zc[z].b*j); }
    col.needsUpdate=true;
  }
}
function buildIsland(){
  terrainMeshes.forEach(m=>{ islandGroup.remove(m); m.geometry.dispose(); });
  skirtMeshes.forEach(m=>{ islandGroup.remove(m); m.geometry.dispose(); });
  foamMeshes.forEach(m=>{ scene.remove(m); m.geometry.dispose(); });
  terrainMeshes=[]; skirtMeshes=[]; foamMeshes=[];
  const main=buildTopGrid(0,0,(R()+9)*2,1);
  islandGroup.add(main); terrainMeshes.push(main);
  const sk=ringStrip(a=>outlineR(a)+.2, a=>outlineR(a)*.55, -.1,-5.5, rockMat,true);
  islandGroup.add(sk); skirtMeshes.push(sk);
  const fo=ringStrip(a=>outlineR(a)+.1, a=>outlineR(a)+1.5, -1.95,-1.95, foamMat,false);
  scene.add(fo); foamMeshes.push(fo);
  PATCHES.forEach(p=>{ if(!p.owned) return;
    const px=Math.cos(p.ang)*p.dist, pz=Math.sin(p.ang)*p.dist;
    const g=buildTopGrid(px,pz,(p.r+4)*2,.9); islandGroup.add(g); terrainMeshes.push(g);
    const sk2=ringStrip(a=>patchR(p,a)+.2, a=>patchR(p,a)*.5, -.1,-4.5, rockMat,true);
    sk2.position.set(px,0,pz); islandGroup.add(sk2); skirtMeshes.push(sk2);
    const fo2=ringStrip(a=>patchR(p,a)+.1, a=>patchR(p,a)+1.4, -1.95,-1.95, foamMat,false);
    fo2.position.set(px,0,pz); scene.add(fo2); foamMeshes.push(fo2);
  });
  recolorTerrain();
  scatterNature();
}

}

const _c=new THREE.Color();
function burst(pos,color,n=24,sp=4,life=1,grav=-6,up=3){
  _c.set(color);
  for(let i=0;i<n;i++){ if(parts.length>=PMAX) parts.shift();
    const a=rand(Math.PI*2), e=rand(-1,1), v=rand(sp*.3,sp);
    parts.push({x:pos.x,y:pos.y,z:pos.z, vx:Math.cos(a)*v, vy:rand(up*.3,up)+e, vz:Math.sin(a)*v,
      life:0, max:rand(life*.5,life), r:_c.r,g:_c.g,b:_c.b, grav});
  }
}
function updateParts(dt){
  let w=0;
  for(let i=0;i<parts.length;i++){ const p=parts[i]; p.life+=dt;
    if(p.life<p.max){ p.vy+=p.grav*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; parts[w++]=p; } }
  parts.length=w;
  for(let i=0;i<PMAX;i++){ const on=i<w;
    pPos[i*3]=on?parts[i].x:0; pPos[i*3+1]=on?parts[i].y:-999; pPos[i*3+2]=on?parts[i].z:0;
    if(on){ const f=1-parts[i].life/parts[i].max;
      pCol[i*3]=parts[i].r*f; pCol[i*3+1]=parts[i].g*f; pCol[i*3+2]=parts[i].b*f; } }
  pGeo.attributes.position.needsUpdate=true; pGeo.attributes.color.needsUpdate=true;
}

const citizens=[];
function makeCitizenMesh(e){
  const g=G();
  const bodyC=Math.random()<.3? pick([0xd05a4a,0x4a9e5a,0xb85ad0,0xe0a03a]) : CIT_COL[e];

  aL.geometry.translate(0,-.1,0); aR.geometry.translate(0,-.1,0); aL.position.y=.62; aR.position.y=.62;
  g.add(aL); g.add(aR); g.userData.arms=[aL,aR];
  if(e===1) g.add(B(.34,.05,.34,0xd8c89a,{y:.88,ol:false}));
  if(e===2) g.add(CO(.2,.14,8,0xd8b86a,{y:.92,ol:false}));
  if(e===3) g.add(C(.12,.13,.09,8,0x3a3a42,{y:.9,ol:false}));
  if(e===4) g.add(B(.3,.06,.2,0x2a2a2a,{y:.86,ol:false}));
  if(e===5) g.add(_m(new THREE.TorusGeometry(.17,.03,6,12),0x35e0e6,{y:.8,rx:Math.PI/2,basic:true,op:.9}));
  if(e===6) g.add(SP(.19,0xbfe8ff,{y:.78,basic:true,op:.35}));
  return g;
}
function spawnCitizen(x,z){
  if(x===undefined){ for(let i=0;i<10;i++){ const a=rand(Math.PI*2),d=rand(2,R()*.8);
    const tx=Math.cos(a)*d, tz=Math.sin(a)*d; if(landH(tx,tz)>0.55){ x=tx; z=tz; break; } }
    x=x??0; z=z??0; }
  const g=makeCitizenMesh(S.era);
  g.position.set(x,landH(x,z),z);
  islandGroup.add(g);
  const c={g, tx:g.position.x, tz:g.position.z, sp:rand(1,1.7), state:'walk', t:rand(2), ph:rand(6.28)};
  citizens.push(c); return c;
}
function newTarget(c){
  for(let i=0;i<8;i++){
    const a=rand(Math.PI*2), d=rand(2,R()*.85);
    const x=Math.cos(a)*d, z=Math.sin(a)*d;
    if(landH(x,z)>0.55){ c.tx=x; c.tz=z; return; }
  }
  c.tx=0; c.tz=0;
}
function updateCitizens(dt,t){
  const target=Math.min(S.pop,46);
  while(citizens.length<target) spawnCitizen();
  while(citizens.length>target){ const c=citizens.pop(); islandGroup.remove(c.g); }
  for(const c of citizens){
    const g=c.g;
    if(c.state==='walk'){
      const dx=c.tx-g.position.x, dz=c.tz-g.position.z, d=Math.hypot(dx,dz);
      if(d<.25){ c.state='idle'; c.t=rand(1.5,4); }
      else { const v=c.sp*dt; g.position.x+=dx/d*v; g.position.z+=dz/d*v;
        g.rotation.y=Math.atan2(dx,dz);
        g.position.y=landH(g.position.x,g.position.z)+Math.abs(Math.sin(t*9+c.ph))*.07;
        const [aL,aR]=g.userData.arms; aL.rotation.x=Math.sin(t*9+c.ph)*.6; aR.rotation.x=-Math.sin(t*9+c.ph)*.6; }
    } else if(c.state==='idle'){
      c.t-=dt; g.position.y=landH(g.position.x,g.position.z);
      const [aL,aR]=g.userData.arms; aL.rotation.x*=.9; aR.rotation.x*=.9;
      if(c.t<=0){ c.state='walk'; newTarget(c); }
    } else if(c.state==='pray'){
      c.t-=dt;
      const [aL,aR]=g.userData.arms;
      aL.rotation.x=lerp(aL.rotation.x,-2.6,.12); aR.rotation.x=lerp(aR.rotation.x,-2.6,.12);
      if(c.t<=0){ c.state='walk'; newTarget(c); }
    }
  }
}

const ndc=new THREE.Vector2(); let pointerOn=false, hoverCell=null, hoverValid=false, downPos=null;
const _ray=new THREE.Raycaster(), _plane=new THREE.Plane(V3(0,1,0),0), _hit=V3();
/* 建造幽灵预览：绿=可建，红=不可建 */
let ghost=null, ghostType=undefined;
const GHOST_OK=new THREE.MeshBasicMaterial({color:0x7affc0,transparent:true,opacity:.42,depthWrite:false});
const GHOST_BAD=new THREE.MeshBasicMaterial({color:0xff6a6a,transparent:true,opacity:.42,depthWrite:false});
function refreshGhost(){
  if(S.sel===ghostType) return;
  ghostType=S.sel;
  if(ghost){ scene.remove(ghost); ghost=null; }
  if(S.sel){
    GHOSTING=true; ghost=makeBuilding(S.sel,S.era); GHOSTING=false;
    ghost.traverse(m=>{ if(m.isMesh){ m.material=GHOST_OK; m.castShadow=false; } });
    scene.add(ghost);
  }
}
function updateHover(){
  refreshGhost();
  if(!pointerOn||S.transitioning||S.over){ highlight.visible=false; hoverCell=null; if(ghost)ghost.visible=false; return; }
  _ray.setFromCamera(ndc,camera);
  if(!_ray.ray.intersectPlane(_plane,_hit)){ highlight.visible=false; hoverCell=null; if(ghost)ghost.visible=false; return; }
  const cx=Math.round(_hit.x/CELL), cz=Math.round(_hit.z/CELL);
  if(Math.abs(cx)>maxCell()||Math.abs(cz)>maxCell()){ highlight.visible=false; hoverCell=null; if(ghost)ghost.visible=false; return; }
  hoverCell={x:cx,z:cz};
  const def=CATALOG.find(d=>d.t===S.sel);
  hoverValid=!!def&&walkable(cx,cz)&&!S.cells.has(cellKey(cx,cz))&&canAfford(costOf(def));
  if(ghost){
    ghost.visible=!!S.sel;
    ghost.position.set(cx*CELL,cellY(cx,cz),cz*CELL);
    const mat=hoverValid?GHOST_OK:GHOST_BAD;
    ghost.traverse(m=>{ if(m.isMesh) m.material=mat; });
  }
  highlight.position.set(cx*CELL,cellY(cx,cz)+.06,cz*CELL);
  highlight.visible=!!S.sel&&hoverValid;
}
renderer.domElement.addEventListener('pointermove',e=>{
  ndc.set(e.clientX/innerWidth*2-1, -(e.clientY/innerHeight)*2+1); pointerOn=true;
});
renderer.domElement.addEventListener('pointerdown',e=>{ downPos=[e.clientX,e.clientY]; });
renderer.domElement.addEventListener('pointerup',e=>{
  if(!downPos) return;
  const moved=Math.hypot(e.clientX-downPos[0],e.clientY-downPos[1]); downPos=null;
  if(moved>6) return;
  if(S.transitioning||S.over) return;
  if(S.expandMode){ claimPatchAt(e); return; }
  if(S.sel&&hoverCell&&hoverValid) tryBuild(hoverCell.x,hoverCell.z);
});
function costOf(def){
  return def.t==='wonder'? wonderCost(S.era) : def.cost;
}
function canAfford(cost){ return S.wood>=cost[0]&&S.gold>=cost[1]&&S.faith>=cost[2]; }
function pay(cost){ S.wood-=cost[0]; S.gold-=cost[1]; S.faith-=cost[2]; }
function tryBuild(x,z){
  const def=CATALOG.find(d=>d.t===S.sel); if(!def) return;
  if(def.t==='wonder'&&S.wonders[S.era]){ toast('本时代的奇观已建成','🏛️'); return; }
  const cost=costOf(def);
  if(!canAfford(cost)){ sfx.error(); toast('资源不足！需要 '+costText(cost),'⚠️'); return; }
  pay(cost); placeBuilding(def.t,S.era,x,z); sfx.build();

    burst(V3(x*CELL,2,z*CELL),0xffd76a,60,7,1.6,-3,6); }
  refreshHUD(); renderDock();
}
function placeBuilding(t,e,x,z,relic=false,slow=false){
  const g=makeBuilding(t,e);
  g.position.set(x*CELL,cellY(x,z)-.06,z*CELL); g.rotation.y=randi(0,3)*Math.PI/2;
  g.add(C(1.02,1.14,.18,10,0xb8b0a0,{y:-.02,ol:false}));   // 地基平台，贴合坡地
  g.scale.setScalar(.01); islandGroup.add(g);

function costText(c){ const s=[]; if(c[0])s.push('🪵'+c[0]); if(c[1])s.push('🪙'+c[1]); if(c[2])s.push('✨'+c[2]); return s.join(' '); }

/* ================= 经济循环 ================= */
let tickAcc=0, popAcc=0, saveAcc=0, evtAcc=20, prayAcc=8;
function econTick(){
  const mul=eraMul(), rainB=S.buffs.rain>0?2:1;
  let dFood=0,dWood=0,dGold=0,dFaith=0,happyT=52;
  S.cells.forEach(b=>{
    const m=b.relic? .5 : (1+b.era*.25);
    switch(b.t){
      case 'farm': dFood+=.95*m*rainB; break;
      case 'wood': dWood+=.6*m; break;
      case 'market': dGold+=.55*m; happyT+=2; break;
      case 'temple': dFaith+=.24*m; happyT+=3; break;
      case 'park': happyT+=5; break;
      case 'wonder': happyT+=8; if(b.relic){dGold+=.35;} else {dFaith+=.15;} break;
    }
  });
  dFood-=S.pop*.085;
  S.food=Math.max(0,S.food+dFood);
  S.wood+=dWood; S.gold+=dGold; S.faith+=dFaith;
  happyT+= S.food>0? 8 : -16;
  happyT-= Math.max(0,S.pop-18)*.35;
  happyT+= S.buffs.rain>0? 3 : 0;
  S.happy=lerp(S.happy,clamp(happyT,5,98),.06);
  // 飘字（少量）
  if(Math.random()<.3){ const arr=[...S.cells.values()].filter(b=>!b.relic&&(b.t==='farm'||b.t==='market'||b.t==='temple'));
    if(arr.length){ const b=pick(arr);
      floatText(b.g.position, b.t==='farm'?'🌾':b.t==='market'?'🪙':'✨', '#ffe9b0'); } }
}
function popTick(){
  const cap=popCap();
  if(S.pop<cap&&S.food>10&&S.happy>45){ S.pop++; S.food=Math.max(0,S.food-4); if(Math.random()<.5)toast('新生命诞生！人口+1','👶'); }
  else if(S.food<=0&&S.pop>2&&Math.random()<.4){ S.pop--; toast('有市民因饥饿离开了','💀'); }
}

/* ================= 时代跃迁 ================= */
function eraReady(){
  if(S.era>=6) return false;
  const r=eraReq(S.era);
  return S.pop>=r.pop && S.gold>=r.gold && S.wonders[S.era];
}
function eraUp(){
  if(!eraReady()||S.transitioning) return;
  S.transitioning=true; S.sel=null; highlight.visible=false;
  document.body.classList.add('cine');
  const oldGold=eraReq(S.era).gold; S.gold-=oldGold;
  sfx.era();
  // 时光飞逝
  S.buffs.haste=Math.max(S.buffs.haste,0);
  const oldScale=S.timeScale; S.timeScale=10;
  setTimeout(()=>{
    S.era++; setPalette(S.era);
    morphBuildings();
    // 市民换装
    citizens.forEach(c=>{ const p=c.g.position.clone(); islandGroup.remove(c.g); c.g=makeCitizenMesh(S.era); c.g.position.copy(p); islandGroup.add(c.g); });
    // 标题
    $('era-anim-title').textContent=ERAS[S.era].name;
    $('era-anim-sub').textContent='第 '+(S.era+1)+' 纪元 · '+ERA_TITLE_SUB[S.era];
    $('overlay-era').classList.remove('hidden');
    $('era-anim').classList.remove('show'); void $('era-anim').offsetWidth; $('era-anim').classList.add('show');
    $('era-icon').textContent=ERAS[S.era].icon;
    $('era-name').textContent=ERAS[S.era].name;
    $('era-sub').textContent='第 '+(S.era+1)+' 纪元';
    burst(V3(0,4,0),0xffffff,100,14,2,-1,8);
  },2300);
  setTimeout(()=>{ S.timeScale=oldScale; },3800);
  setTimeout(()=>{
    $('overlay-era').classList.add('hidden');
    document.body.classList.remove('cine');
    S.transitioning=false;
    toast('文明进入'+ERAS[S.era].name+'！建筑已全面进化',ERAS[S.era].icon);
    refreshHUD(); renderDock(); saveGame();
  },5800);
}
function morphBuildings(){
  let i=0;
  S.cells.forEach((b,key)=>{
    if(b.t==='wonder'){ b.relic=true; return; }  // 旧奇观保留为遗迹
    const [x,z]=key.split(',').map(Number);
    setTimeout(()=>{
      burst(b.g.position.clone().add(V3(0,1,0)),0xffffff,18,4,.8,-2,4);
      islandGroup.remove(b.g);
      b.g=makeBuilding(b.t,S.era);

      b.g.add(C(1.02,1.14,.18,10,0xb8b0a0,{y:-.02,ol:false}));
      b.g.scale.setScalar(.01); islandGroup.add(b.g);
      tw(.6,k=>b.g.scale.setScalar(Math.max(.01,k)),easeOutBack);

}

/* ================= 昼夜 / 调色板 ================= */
const bgCol=new THREE.Color(); scene.background=bgCol;
const _t1=new THREE.Color(), _t2=new THREE.Color();
function smooth(a,b,x){ const t=clamp((x-a)/(b-a),0,1); return t*t*(3-2*t); }
let dayF=1;
function dayNight(){
  const ang=S.dayTime*Math.PI*2;
  const elev=Math.sin(ang);
  dayF=smooth(-.1,.28,elev);
  const duskF=Math.exp(-Math.pow(elev/.18,2))*(Math.cos(ang)<0?1:.3);
  // 天空/雾
  bgCol.copy(PAL.night).lerp(PAL.sky,dayF).lerp(PAL.dusk,duskF*.55);
  scene.fog.color.copy(bgCol);
  // 太阳/月亮
  sun.position.set(Math.cos(ang)*70,Math.sin(ang)*80,36);
  sun.intensity=.1+1.35*dayF;
  _t1.set(0xff9a5a); _t2.copy(PAL.sun);
  sun.color.copy(_t2).lerp(_t1,duskF*.6);
  if(elev<-.05){ sun.color.set(0x8a9ac8); sun.intensity=.16; sun.position.set(-Math.cos(ang)*70,-Math.sin(ang)*80,36); }
  hemi.intensity=.3+.5*dayF;
  sunSpr.position.copy(sun.position).normalize().multiplyScalar(190); sunSpr.visible=elev>-.15;
  moonSpr.position.set(-Math.cos(ang),-Math.sin(ang),-.3).normalize().multiplyScalar(190); moonSpr.visible=elev<.15;
  starMat.opacity=1-dayF;
  WIN_MAT.color.set(dayF>.5?0x46586a:0xffd77a);
  waterMat.color.copy(PAL.water).multiplyScalar(.35+.65*dayF);
  // 时钟图标
  $('clock').textContent=dayF>.6?'☀️':(duskF>.5?'🌇':'🌙');
}
function paletteLerp(dt){
  const k=1-Math.pow(.25,dt);
  PAL_KEYS.forEach(key=>PAL[key].lerp(PAL_T[key],k));
  rockMat.color.copy(PAL.rock); leafMat.color.copy(PAL.leaf);
  recolorTerrain();
}

/* ================= 环境动效 ================= */
function waterWave(t){
  const p=waterGeo.attributes.position.array;
  for(let i=0;i<p.length;i+=3){
    p[i+2]=Math.sin(p[i]*.14+t*1.1)*.32+Math.cos(p[i+1]*.12+t*.9)*.32;
  }
  waterGeo.attributes.position.needsUpdate=true;
  foamMeshes.forEach(f=>f.scale.setScalar(1+Math.sin(t*1.4)*.02));
  foamMat.opacity=.32+Math.sin(t*1.4)*.12;
}
function envMove(dt,t){
  clouds.forEach(c=>{ c.position.x+=c.userData.sp*dt; if(c.position.x>90)c.position.x=-90; });
  const bt=t*.12;
  boat.position.set(Math.cos(bt)*(R()+7),-1.9+Math.sin(t*1.3)*.15,Math.sin(bt)*(R()+7));
  boat.rotation.y=-bt+Math.PI/2; boat.rotation.z=Math.sin(t*1.3)*.05;
  birds.forEach(b=>{ const u=b.userData, a=t*u.sp+u.ph;
    b.position.set(Math.cos(a)*u.r,u.h+Math.sin(t*2+u.ph),Math.sin(a)*u.r);
    b.rotation.y=-a; });
}
function animUpdate(dt,t){
  for(const m of animBits){
    const k=m.userData.anim, ph=m.userData.ph||0;
    if(k==='spin') m.rotation.y+=dt*1.4;
    else if(k==='bob'){ if(m.userData.by===undefined)m.userData.by=m.position.y;
      m.position.y=m.userData.by+Math.sin(t*2+ph)*.18; }
    else if(k==='blink') m.visible=Math.sin(t*3+ph)>-.3;
  }
}
let smokeAcc=0;
function inScene(o){ let p=o; while(p.parent)p=p.parent; return p===scene; }
function smokeUpdate(dt){
  smokeAcc+=dt;
  if(smokeAcc>.35){ smokeAcc=0;
    for(const g of smokeEmitters){ if(!inScene(g)) continue;
      burst(g.position.clone().add(V3(.4,1.5,.4)),0x8a8a8a,1,.4,2.2,1.6,.6); } }
}

/* ================= 主循环 ================= */
const clock=new THREE.Clock();
let hudAcc=0;
function loop(){
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),.05);
  const t=clock.elapsedTime;
  const spd=S.timeScale*(S.buffs.haste>0?3:1);
  const gdt=dt*spd;
  updateTweens(dt);
  if(S.started&&!S.over){
    S.playTime+=gdt;
    S.dayTime=(S.dayTime+gdt/130)%1;
    for(const k in S.cds) S.cds[k]=Math.max(0,S.cds[k]-dt);
    if(S.buffs.rain>0){ S.buffs.rain-=gdt; if(S.buffs.rain<=0) rainPts.visible=false; }
    if(S.buffs.haste>0) S.buffs.haste-=dt;
    tickAcc+=gdt; while(tickAcc>=1){ tickAcc-=1; econTick(); }
    popAcc+=gdt; if(popAcc>=3){ popAcc=0; popTick(); }
    evtAcc+=gdt; if(evtAcc>38){ evtAcc=0; fireEvent(); }
    prayAcc+=gdt; if(prayAcc>13){ prayAcc=0; spawnPrayer(); }
    saveAcc+=dt; if(saveAcc>15){ saveAcc=0; saveGame(); }
    hudAcc+=dt; if(hudAcc>.3){ hudAcc=0; refreshHUD(); updateGodDock(); }
    updateCitizens(gdt,t);
    updatePrayer(dt);
    updateLaunch(dt);
    if(S.buffs.rain>0){
      for(const d of rainDrops){ d.y-=d.sp*dt; if(d.y<0)resetDrop(d); }
      for(let i=0;i<RAIN_N;i++){ rPos[i*3]=rainDrops[i].x; rPos[i*3+1]=rainDrops[i].y; rPos[i*3+2]=rainDrops[i].z; }
      rainGeo.attributes.position.needsUpdate=true;
    }
  }
  dayNight(); paletteLerp(dt); waterWave(t); envMove(dt,t); animUpdate(gdt,t);
  updateParts(dt); smokeUpdate(dt); updateHover();
  controls.update();
  if(shake>0){ shake=Math.max(0,shake-dt*1.2);
    const s=shake*14;
    renderer.domElement.style.transform='translate('+rand(-s,s)+'px,'+rand(-s,s)+'px)';
  } else renderer.domElement.style.transform='';
  renderer.render(scene,camera);
}

/* ================= 初始化 ================= */
$('btn-start').onclick=()=>{
  ac(); sfx.era();
  $('overlay-intro').classList.add('hidden');
  S.started=true;
  camera.position.set(85,60,90);
  tw(2.6,k=>{ camera.position.set(lerp(85,30,k),lerp(60,26,k),lerp(90,34,k)); },t=>1-Math.pow(1-t,3));
  setTimeout(()=>toast('点击下方卡片，在岛上放置建筑','👇'),2800);
  setTimeout(()=>toast('目标：发展人口，建造奇观，让文明跃迁！','🎯'),6600);
};
(function init(){
  const had=loadGame();
  // 初始示范建筑（仅新游戏）
  if(!had){
    placeBuilding('house',0,-2,1); placeBuilding('house',0,2,-1);
    placeBuilding('farm',0,1,2); placeBuilding('temple',0,-1,-2);
    S.cells.forEach(b=>b.g.scale.setScalar(1));
  } else {
    S.cells.forEach(b=>b.g.scale.setScalar(1));
    $('era-icon').textContent=ERAS[S.era].icon;
    $('era-name').textContent=ERAS[S.era].name;
    $('era-sub').textContent='第 '+(S.era+1)+' 纪元';
    setTimeout(()=>toast('已读取存档，文明继续…','📜'),800);
  }
  tweens.length=0; // 取消初始建筑的生长动画，直接成型
  renderDock(); refreshHUD();
  loop();
})();
</script>
