<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>神明小岛 · Deus Isle</title>
<style>
  @font-face {
    font-family: "Alimama FangYuanTi";
    src: url("/fonts/AlimamaFangYuanTi.ttf") format("truetype-variations");
    font-weight: 100 900;
    font-display: swap;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --font-ui: "Alimama FangYuanTi","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    --font-mono: "SF Mono","JetBrains Mono",Consolas,monospace;
    --bg: #07090f;
    --panel: rgba(255,255,255,.04);
    --panel-hover: rgba(255,255,255,.08);
    --border: rgba(255,255,255,.06);
    --text: rgba(255,255,255,.92);
    --text-dim: rgba(255,255,255,.42);
    --text-faint: rgba(255,255,255,.22);
    --accent: rgba(255,255,255,.6);
    --touch-min: 44px;
    --radius: 14px;
    --blur: blur(20px);
  }
  html,body { width:100%; height:100%; overflow:hidden; background:var(--bg);
    font-family:var(--font-ui); font-variation-settings:"wght" 400;
    color:var(--text); user-select:none; -webkit-user-select:none; }
  * { scrollbar-width:none; -ms-overflow-style:none; }
  *::-webkit-scrollbar { width:0 !important; height:0 !important; display:none !important; }
  #stage { position:fixed; inset:0; }
  #stage canvas { display:block; }

  /* ---------- Iconify ---------- */
  iconify-icon { display:inline-flex; vertical-align:-0.125em; width:1em; height:1em; color:inherit; fill:currentColor; pointer-events:none; }

  /* ---------- UI Layer ---------- */
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; transition:opacity .4s; }
  #ui > * { pointer-events:auto; }
  #ui.ui-hidden { opacity:0; pointer-events:none; }
  #ui.ui-hidden > * { pointer-events:none; }
  .panel { background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); border-radius:var(--radius); }

  /* ---------- Topbar ---------- */
  #topbar { position:absolute; top:10px; left:10px; right:10px; display:flex; align-items:center; gap:8px; justify-content:space-between; pointer-events:none; }
  #topbar > * { pointer-events:auto; }
  #topbar-left, #topbar-right { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  #topbar-right { justify-content:flex-end; }
  #era-badge { display:flex; align-items:center; gap:8px; padding:6px 12px; border-radius:var(--radius);
    background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); }
  #era-icon { display:inline-flex; width:20px; height:20px; color:var(--text); }
  #era-icon iconify-icon { width:20px; height:20px; }
  #era-name { color:var(--text); font-weight:600; font-size:13px; letter-spacing:.06em; white-space:nowrap; }
  #era-sub { color:var(--text-dim); font-size:9px; letter-spacing:.18em; text-transform:uppercase; }
  .res { display:flex; align-items:center; gap:5px; color:var(--text); font-size:12px; font-weight:500;
    padding:5px 10px; border-radius:var(--radius); background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); white-space:nowrap; }
  .res iconify-icon { width:15px; height:15px; opacity:.7; }
  .res span { min-width:18px; text-align:right; font-variant-numeric:tabular-nums; }
  .res.flash { animation:resFlash .5s; }
  @keyframes resFlash { 0%{ background:rgba(255,255,255,.14);} 100%{ background:var(--panel);} }
  #topbar-left.collapsed .res { display:none; }
  .crisis-banner { position:absolute; top:58px; left:50%; transform:translateX(-50%); padding:6px 18px; border-radius:999px;
    font-size:12px; font-weight:500; letter-spacing:.08em; color:var(--text); background:rgba(255,255,255,.08); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur);
    border:1px solid rgba(255,255,255,.12); pointer-events:none; z-index:20; white-space:nowrap; }
  .crisis-banner.hidden { display:none; }
  #clock { display:inline-flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:var(--radius);
    background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); color:var(--text); }
  #clock iconify-icon { width:18px; height:18px; opacity:.7; }
  .icon-btn { width:36px; height:36px; border-radius:var(--radius); border:1px solid var(--border);
    background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); color:var(--text);
    cursor:pointer; transition:.2s; display:inline-flex; align-items:center; justify-content:center; }
  .icon-btn iconify-icon { width:17px; height:17px; opacity:.7; }
  .icon-btn:hover { background:var(--panel-hover); }
  .icon-btn:hover iconify-icon { opacity:1; }

  /* ---------- Task Panel (left) ---------- */
  #task-panel { position:absolute; top:56px; left:10px; width:min(230px,62vw); max-height:min(320px,52vh); overflow-y:auto;
    padding:14px 16px; z-index:12; transition:max-height .25s ease; }
  #ui.ui-hidden #task-panel { pointer-events:none; }
  #task-panel.collapsed { max-height:44px; overflow:hidden; }
  .task-head { display:flex; align-items:center; gap:7px; color:var(--text-dim); font-size:10px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; cursor:pointer; user-select:none; }
  .task-head iconify-icon { width:13px; height:13px; }
  .task-toggle { margin-left:auto; opacity:.4; transition:transform .25s; }
  #task-panel.collapsed .task-toggle { transform:rotate(-90deg); }
  .task-list { display:flex; flex-direction:column; gap:6px; margin-top:10px; }
  #task-panel.collapsed .task-list { display:none; }
  .task-item { display:flex; align-items:center; gap:8px; padding:7px 10px; border-radius:10px; background:rgba(255,255,255,.03); color:var(--text); font-size:11px; line-height:1.4; transition:.2s; }
  .task-item.done { opacity:.35; }
  .task-item.done .task-text { text-decoration:line-through; }
  .task-icon { display:flex; opacity:.6; }
  .task-icon iconify-icon { width:14px; height:14px; }
  .task-text { flex:1; }
  .task-check { color:var(--text); display:flex; }
  .task-check iconify-icon { width:14px; height:14px; }
  .task-empty { color:var(--text-faint); text-align:center; font-size:11px; padding:8px; }

  /* ---------- Skill Bar (right) ---------- */
  #skill-bar { position:absolute; top:56px; right:10px; display:flex; flex-direction:column; gap:4px; align-items:flex-end; max-width:min(200px,48vw); pointer-events:none; z-index:12; }
  .skill-chip { display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:999px;
    background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border);
    color:var(--text); font-size:10px; font-weight:500; letter-spacing:.04em; pointer-events:auto; }
  .skill-chip iconify-icon { width:12px; height:12px; opacity:.6; }

  /* ---------- Bottombar ---------- */
  #bottombar { position:absolute; left:10px; right:10px; bottom:10px; display:flex; gap:8px; align-items:flex-end; justify-content:space-between; pointer-events:none; transition:transform .3s cubic-bezier(.4,0,.2,1); }
  #bottombar > * { pointer-events:auto; }
  #bottombar.collapsed { transform:translateY(calc(100% + 14px)); }
  #build-dock { display:flex; gap:6px; padding:6px; align-items:center; overflow-x:auto;
    background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border); border-radius:var(--radius); max-width:calc(100% - 130px); }
  .b-card { flex:0 0 auto; width:62px; min-height:68px; padding:8px 4px; border-radius:10px; text-align:center; cursor:pointer;
    background:transparent; border:1px solid transparent; transition:.18s; position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .b-card:hover { background:var(--panel-hover); }
  .b-card.sel { background:rgba(255,255,255,.06); border-color:rgba(255,255,255,.15); }
  .b-card.poor { opacity:.3; }
  .b-icon { display:flex; align-items:center; justify-content:center; color:var(--text); }
  .b-icon iconify-icon { width:20px; height:20px; opacity:.8; }
  .b-name { color:var(--text); font-size:9px; font-weight:500; margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; opacity:.7; }
  .b-cost { color:var(--text-dim); font-size:8px; margin-top:2px; white-space:nowrap; letter-spacing:.02em; }
  #side-dock { display:flex; flex-direction:column; gap:6px; width:120px; flex-shrink:0; }
  #god-dock { display:flex; gap:4px; flex-wrap:wrap; }
  .god-btn { flex:1 0 calc(33.33% - 3px); min-width:34px; min-height:40px; padding:4px 1px; border-radius:10px; border:1px solid var(--border);
    background:var(--panel); color:var(--text); font-size:8px; cursor:pointer; text-align:center; transition:.18s; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .god-btn:hover:not(.cd):not(.poor) { background:var(--panel-hover); }
  .god-btn.poor { opacity:.3; cursor:not-allowed; }
  .god-btn.cd { cursor:not-allowed; }
  .god-btn .cdmask { position:absolute; inset:0; background:rgba(0,0,0,.45); transform-origin:bottom; }
  .god-btn b { display:flex; align-items:center; justify-content:center; margin-bottom:1px; }
  .god-btn b iconify-icon { width:16px; height:16px; opacity:.8; }
  .god-btn span { display:block; line-height:1.1; opacity:.6; }
  .act-btn { border:1px solid var(--border); border-radius:var(--radius); padding:8px 6px; font-size:12px; font-weight:500; cursor:pointer;
    color:var(--text); background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); transition:.2s; letter-spacing:.04em;
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap; min-height:var(--touch-min); }
  .act-btn:hover:not(:disabled) { background:var(--panel-hover); }
  .act-btn:disabled { opacity:.3; cursor:not-allowed; }
  .act-btn iconify-icon { width:15px; height:15px; margin-right:4px; opacity:.7; }
  .act-btn small { display:block; width:100%; font-size:8px; font-weight:400; opacity:.45; margin-top:2px; letter-spacing:0; }
  .act-btn small iconify-icon { width:11px; height:11px; margin:0 1px; }
  #btn-eraup.ready { border-color:rgba(255,255,255,.25); }
  #btn-eraup.ready { animation:pulseGlow 2s infinite; }
  @keyframes pulseGlow { 0%,100%{ border-color:rgba(255,255,255,.1);} 50%{ border-color:rgba(255,255,255,.3);} }
  .btn-launch { border-color:rgba(255,255,255,.3) !important; animation:pulseGlow 1.5s infinite; }

  /* ---------- Bottom Toggle ---------- */
  #bottombar-toggle { position:absolute; left:50%; bottom:10px; transform:translateX(-50%); width:48px; height:20px;
    border-radius:10px 10px 0 0; border:1px solid var(--border); border-bottom:none;
    background:var(--panel); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); color:var(--text); cursor:pointer; z-index:11;
    display:flex; align-items:center; justify-content:center; transition:.2s; pointer-events:auto; opacity:.5; }
  #bottombar-toggle:hover { opacity:1; }
  #bottombar-toggle iconify-icon { width:16px; height:16px; }
  #bottombar.collapsed ~ #bottombar-toggle iconify-icon { transform:rotate(180deg); }

  /* ---------- Toasts / Floaters / Prayers ---------- */
  #toasts { position:absolute; top:60px; right:10px; display:flex; flex-direction:column; gap:6px; pointer-events:none !important; max-width:min(320px,70vw); }
  .toast { padding:8px 14px; border-radius:10px; color:var(--text); font-size:12px; font-weight:400;
    background:rgba(8,10,16,.85); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border);
    animation:toastIn .4s cubic-bezier(.2,1.4,.4,1); display:flex; align-items:flex-start; gap:7px; line-height:1.4; }
  .toast iconify-icon { width:14px; height:14px; opacity:.6; flex-shrink:0; margin-top:1px; }
  .toast.out { animation:toastOut .4s forwards; }
  @keyframes toastIn { from{ transform:translateX(120%); opacity:0;} to{ transform:none; opacity:1;} }
  @keyframes toastOut { to{ transform:translateX(120%); opacity:0;} }
  #prayers { position:absolute; inset:0; pointer-events:none !important; }
  .prayer { position:absolute; transform:translate(-50%,-110%); cursor:pointer; pointer-events:auto !important;
    background:rgba(8,10,16,.85); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border:1px solid var(--border);
    color:var(--text); font-size:12px; font-weight:400; padding:7px 14px; border-radius:999px; white-space:nowrap; animation:prayBob 2s ease-in-out infinite;
    display:inline-flex; align-items:center; }
  .prayer iconify-icon { width:13px; height:13px; margin-right:4px; opacity:.6; }
  .prayer:hover { background:rgba(255,255,255,.08); }
  @keyframes prayBob { 0%,100%{ margin-top:0;} 50%{ margin-top:-7px;} }
  .floater { position:absolute; transform:translate(-50%,-50%); font-size:13px; font-weight:600; pointer-events:none !important;
    color:var(--text); text-shadow:0 2px 8px rgba(0,0,0,.8); animation:floatUp 1.4s ease-out forwards;
    display:inline-flex; align-items:center; gap:2px; }
  @keyframes floatUp { 0%{ opacity:0; margin-top:6px;} 15%{ opacity:1;} 100%{ opacity:0; margin-top:-44px;} }

  /* ---------- Overlays ---------- */
  .overlay { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center; flex-direction:column;
    background:rgba(5,7,12,.7); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); transition:opacity .5s; }
  .overlay.hidden { opacity:0; pointer-events:none; }

  /* Intro */
  #overlay-intro { align-items:flex-start; justify-content:center; padding:0 8vw; }
  .intro-panel { display:flex; flex-direction:column; align-items:flex-start; max-width:min(520px,80vw); }
  .intro-panel > .intro-en, .intro-panel > .intro-zh { opacity:0; transform:translateX(-24px); animation:introIn .8s cubic-bezier(.2,.8,.2,1) forwards; }
  .intro-panel > .intro-en { animation-delay:.1s; }
  .intro-panel > .intro-zh { animation-delay:.25s; }
  @keyframes introIn { to { opacity:1; transform:translateX(0); } }
  #intro-content { opacity:1; transform:translateX(0); transition:opacity .18s ease, transform .18s ease; }
  #intro-content.intro-fade-out { opacity:0; transform:translateX(-12px); }
  #intro-content.intro-fade-in { opacity:1; transform:translateX(0); transition:opacity .32s ease, transform .32s cubic-bezier(.2,.8,.2,1); }
  .intro-en { font-size:clamp(32px,6vw,54px); color:var(--text); letter-spacing:0.14em; font-weight:300;
    margin:0 0 6px; line-height:1; }
  .intro-zh { color:var(--text-dim); font-size:clamp(13px,2vw,16px); letter-spacing:0.6em; font-weight:400; margin-bottom:48px; }
  .intro-menu { display:flex; flex-direction:column; align-items:flex-start; gap:4px; }
  .intro-link { background:none; border:none; cursor:pointer; padding:10px 4px; color:var(--text-dim);
    font-family:inherit; font-size:clamp(18px,2.4vw,22px); font-weight:300; letter-spacing:0.15em;
    transition:all .25s; text-align:left; min-height:var(--touch-min); }
  .intro-link:hover { color:var(--text); transform:translateX(8px); }
  .intro-link::before { content:""; display:inline-block; width:0; height:1px; margin-right:0;
    background:var(--text); vertical-align:middle; transition:all .25s; }
  .intro-link:hover::before { width:18px; margin-right:10px; }
  .intro-section-title { color:var(--text-faint); font-size:11px; letter-spacing:0.4em; text-transform:uppercase; font-weight:500; margin-bottom:18px; }
  .intro-slot { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:10px 4px; border-bottom:1px solid var(--border); min-width:280px; }
  .intro-slot-info { color:var(--text); font-size:15px; letter-spacing:0.04em; line-height:1.5; font-weight:400; }
  .intro-slot-info small { display:block; color:var(--text-dim); font-size:11px; margin-top:2px; letter-spacing:0.06em; }
  .intro-slot-actions { display:flex; gap:12px; flex-shrink:0; }
  .intro-mini { background:none; border:none; cursor:pointer; padding:4px 6px; color:var(--text-dim);
    font-family:inherit; font-size:13px; letter-spacing:0.1em; transition:color .2s; min-height:var(--touch-min); }
  .intro-mini:hover { color:var(--text); }
  .intro-mini.danger:hover { color:#ff8080; }
  .intro-row { display:flex; align-items:center; justify-content:space-between; gap:24px; padding:12px 4px; border-bottom:1px solid var(--border); min-width:300px; }
  .intro-row-label { color:var(--text); font-size:15px; letter-spacing:0.08em; font-weight:400; }
  .intro-toggle { background:none; border:none; cursor:pointer; padding:4px 6px; color:var(--text-dim);
    font-family:inherit; font-size:14px; letter-spacing:0.2em; transition:color .2s; min-height:var(--touch-min); }
  .intro-toggle.on { color:var(--text); }
  .intro-about { color:var(--text-dim); font-size:14px; line-height:2.1; letter-spacing:0.06em; max-width:380px; font-weight:400; }
  .intro-about p { margin:0 0 14px; }
  .intro-about .ver { color:var(--text-faint); font-size:11px; letter-spacing:0.3em; margin-top:24px; }
  .intro-back { margin-top:32px; }

  /* Era transition */
  #overlay-era { pointer-events:none; background:rgba(5,7,12,.5); }
  #era-anim { text-align:center; opacity:0; }
  #era-anim.show { animation:eraTitle 3.4s cubic-bezier(.2,.8,.2,1) forwards; }
  @keyframes eraTitle { 0%{ opacity:0; transform:scale(1.6); letter-spacing:60px; filter:blur(12px);}
    18%{ opacity:1; transform:scale(1); filter:blur(0);} 80%{ opacity:1;} 100%{ opacity:0; transform:scale(.94);} }
  #era-anim-title { font-size:min(72px,12vw); font-weight:300; color:var(--text); letter-spacing:22px; }
  #era-anim-sub { font-size:14px; color:var(--text-dim); letter-spacing:10px; margin-top:14px; }

  /* Skill overlay */
  #overlay-skill { z-index:60; }
  #overlay-skill.hidden { pointer-events:none; }
  #overlay-skill .skill-title { color:var(--text); font-size:clamp(18px,3.5vw,26px); font-weight:300; letter-spacing:6px; margin-bottom:6px; text-align:center; }
  #overlay-skill .skill-sub { color:var(--text-faint); font-size:11px; letter-spacing:3px; text-transform:uppercase; margin-bottom:28px; text-align:center; }
  #skill-grid { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; max-width:min(900px,94vw); }
  .skill-card { width:min(250px,90vw); padding:24px 20px; border-radius:var(--radius); background:var(--panel); border:1px solid var(--border);
    cursor:pointer; transition:.2s; color:var(--text); text-align:center; }
  .skill-card:hover { transform:translateY(-4px); background:var(--panel-hover); border-color:rgba(255,255,255,.15); }
  .skill-card .skill-icon { display:flex; justify-content:center; margin-bottom:14px; }
  .skill-card .skill-icon iconify-icon { width:36px; height:36px; opacity:.7; }
  .skill-card .skill-name { font-size:17px; font-weight:500; color:var(--text); margin-bottom:6px; letter-spacing:.04em; }
  .skill-card .skill-desc { font-size:12px; color:var(--text-dim); line-height:1.6; }

  /* Pause */
  #overlay-pause { z-index:55; background:rgba(5,7,12,.85); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  #overlay-pause.hidden { pointer-events:none; }
  .pause-menu { display:flex; flex-direction:column; align-items:center; gap:2px; }
  .pause-title { color:var(--text-faint); font-size:11px; letter-spacing:0.6em; text-transform:uppercase; margin-bottom:28px; }
  .pause-link { background:none; border:none; cursor:pointer; padding:12px 8px; color:var(--text-dim);
    font-family:inherit; font-size:clamp(18px,2.4vw,22px); font-weight:300; letter-spacing:0.15em;
    transition:all .25s; text-align:center; min-height:var(--touch-min); }
  .pause-link:hover { color:var(--text); }

  /* Save panel */
  #save-panel { position:fixed; inset:0; background:rgba(5,7,12,.7); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
    z-index:60; display:flex; align-items:flex-end; justify-content:center; }
  #save-panel.hidden { display:none; }
  .save-panel-inner { width:min(560px,100vw); background:rgba(10,14,22,.96); border:1px solid var(--border); border-bottom:none;
    border-radius:20px 20px 0 0; padding:24px 20px 28px; }
  .save-panel-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;
    font-size:14px; letter-spacing:3px; color:var(--text-dim); font-weight:500; text-transform:uppercase; }
  .save-panel-title iconify-icon { width:16px; height:16px; margin-right:8px; opacity:.6; }
  #save-slots { display:flex; flex-direction:column; gap:10px; }
  .save-slot { display:flex; align-items:center; justify-content:space-between; gap:14px; padding:12px 14px;
    background:var(--panel); border:1px solid var(--border); border-radius:10px; transition:.2s; }
  .save-slot:hover { background:var(--panel-hover); }
  .save-slot-info { flex:1; min-width:0; }
  .save-slot-name { font-size:14px; color:var(--text); font-weight:500; letter-spacing:.04em; }
  .save-slot-meta { font-size:11px; color:var(--text-dim); margin-top:4px; letter-spacing:.04em; }
  .save-slot-meta iconify-icon { width:11px; height:11px; margin-right:2px; opacity:.6; }
  .save-slot.empty .save-slot-name { color:var(--text-faint); }
  .save-slot-actions { display:flex; gap:8px; }
  .save-slot-btn { padding:7px 14px; font-size:12px; border-radius:8px; border:1px solid var(--border); cursor:pointer;
    font-family:inherit; letter-spacing:.06em; transition:all .15s; min-height:var(--touch-min);
    background:transparent; color:var(--text-dim); }
  .save-slot-btn:hover { background:var(--panel-hover); color:var(--text); }
  .save-slot-btn.save { color:var(--text); border-color:rgba(255,255,255,.15); }
  .save-slot-btn.delete { color:var(--text-faint); }
  .save-slot-btn.delete:hover { color:#ff8080; border-color:rgba(255,128,128,.2); }
  .save-slot-btn:disabled { opacity:.3; cursor:not-allowed; }
  .save-hint { margin-top:14px; font-size:11px; color:var(--text-faint); letter-spacing:.04em; text-align:center; }

  /* Victory */
  #overlay-victory h1 { font-size:min(48px,8vw); color:var(--text); letter-spacing:10px; font-weight:300;
    display:flex; align-items:center; }
  #overlay-victory h1 iconify-icon { width:1em; height:1em; margin-right:10px; opacity:.7; }
  #overlay-victory .desc { color:var(--text-dim); margin-top:14px; font-size:14px; line-height:1.8; text-align:center; }
  #v-stats { display:flex; gap:30px; margin:30px 0 34px; flex-wrap:wrap; justify-content:center; }
  .v-stat { text-align:center; }
  .v-stat b { display:block; font-size:32px; color:var(--text); font-weight:300; }
  .v-stat span { color:var(--text-faint); font-size:11px; letter-spacing:2px; text-transform:uppercase; }
  .big-btn { border:1px solid rgba(255,255,255,.15); border-radius:var(--radius); padding:14px 32px; font-size:15px; font-weight:400; cursor:pointer;
    color:var(--text); background:var(--panel); transition:.2s; letter-spacing:2px;
    display:inline-flex; align-items:center; justify-content:center; min-height:var(--touch-min); }
  .big-btn:hover { background:var(--panel-hover); }
  .big-btn iconify-icon { width:16px; height:16px; margin-right:8px; opacity:.7; }

  /* Letterbox */
  .lb { position:fixed; left:0; right:0; height:0; background:#000; z-index:40; transition:height .9s cubic-bezier(.6,0,.3,1); }
  .lb.top { top:0; } .lb.bot { bottom:0; }
  body.cine .lb { height:9vh; }

  /* Loading */
  #loading { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--bg); transition:opacity .6s ease; }
  #loading.hidden { opacity:0; pointer-events:none; }
  .loader-title { color:var(--text); font-size:clamp(28px,5vw,42px); letter-spacing:0.2em; font-weight:300; margin-bottom:28px; }
  .loader-bar { width:200px; height:1px; background:rgba(255,255,255,.08); overflow:hidden; }
  .loader-bar i { display:block; height:100%; width:30%; background:var(--text); animation:loadSlide 1.2s ease-in-out infinite; }
  @keyframes loadSlide { 0%{ transform:translateX(-100%); } 100%{ transform:translateX(400%); } }

  /* ---------- Responsive ---------- */
  @media (min-width:641px) {
    #save-panel { align-items:center; }
    .save-panel-inner { border-radius:20px; padding:28px 24px; }
  }
  @media (max-width:640px) {
    #topbar { top:6px; left:6px; right:6px; gap:4px; }
    #topbar-left, #topbar-right { gap:4px; }
    #era-badge { padding:4px 8px; }
    #era-name { font-size:11px; }
    #era-sub { display:none; }
    .res { font-size:10px; padding:4px 7px; gap:3px; }
    .res iconify-icon { width:13px; height:13px; }
    .res span { min-width:14px; }
    .crisis-banner { top:50px; font-size:11px; padding:5px 14px; }
    #clock { width:32px; height:32px; }
    #clock iconify-icon { width:16px; height:16px; }
    .icon-btn { width:32px; height:32px; }
    .icon-btn iconify-icon { width:15px; height:15px; }
    #skill-bar { top:50px; right:6px; }
    #task-panel { top:50px; left:6px; width:min(210px,70vw); padding:10px 12px; }
    #toasts { top:54px; right:6px; gap:5px; }
    .toast { font-size:11px; padding:7px 12px; }
    #bottombar { left:6px; right:6px; bottom:6px; gap:6px; }
    #build-dock { max-width:calc(100% - 108px); padding:5px; gap:5px; }
    .b-card { width:56px; min-height:62px; }
    .b-icon iconify-icon { width:18px; height:18px; }
    .b-name { font-size:8px; }
    #side-dock { width:100px; gap:5px; }
    .god-btn { min-height:36px; font-size:7px; }
    .god-btn b iconify-icon { width:14px; height:14px; }
    .act-btn { font-size:11px; padding:6px 4px; min-height:40px; }
    #overlay-intro { align-items:center; padding:0 6vw; text-align:center; }
    .intro-panel { align-items:center; max-width:92vw; }
    .intro-menu { align-items:center; }
    .intro-link { text-align:center; font-size:20px; padding:12px 8px; }
    .intro-link:hover { transform:none; }
    .intro-link::before { display:none; }
    .intro-en { font-size:clamp(36px,11vw,56px); letter-spacing:0.08em; }
    .intro-zh { font-size:14px; letter-spacing:0.4em; margin-bottom:36px; }
    .intro-slot, .intro-row { min-width:auto; width:100%; }
    .intro-slot { flex-direction:column; align-items:flex-start; gap:10px; }
    .intro-slot-actions { width:100%; justify-content:flex-end; }
    #overlay-victory { padding:0 6vw; text-align:center; }
    #v-stats { gap:18px; }
    .v-stat b { font-size:26px; }
  }
  @media (max-width:400px) {
    .res { padding:3px 5px; }
    #build-dock { max-width:calc(100% - 96px); }
    .b-card { width:50px; min-height:56px; }
    #side-dock { width:90px; }
    .act-btn { font-size:10px; }
  }
  @media (max-height:560px) {
    #overlay-intro { justify-content:flex-start; padding-top:5vh; }
    .intro-zh { margin-bottom:24px; }
    .intro-back { margin-top:18px; }
    #topbar-left .res:nth-child(n+5) { display:none; }
  }
</style>
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
</head>

<div id="loading">
  <div class="loader-title">DEUS ISLE</div>
  <div class="loader-bar"><i></i></div>
</div>

<div id="stage"></div>

<div id="ui">
  <div id="topbar">
    <div id="topbar-left">
      <div id="era-badge">
        <span id="era-icon"><iconify-icon icon="mdi:fire"></iconify-icon></span>
        <div><div id="era-name">远古时期</div><div id="era-sub">ERA 01</div></div>
      </div>
      <div class="res" title="食物"><iconify-icon icon="mdi:wheat"></iconify-icon><span id="r-food">0</span></div>
      <div class="res" title="木材"><iconify-icon icon="ph:tree-fill"></iconify-icon><span id="r-wood">0</span></div>
      <div class="res" title="金币"><iconify-icon icon="mdi:circle-multiple"></iconify-icon><span id="r-gold">0</span></div>
      <div class="res" title="信仰"><iconify-icon icon="mdi:star-shooting"></iconify-icon><span id="r-faith">0</span></div>
      <div class="res" title="人口 / 容量"><iconify-icon icon="mdi:account-group"></iconify-icon><span id="r-pop">0/0</span></div>

    </div>
    <div id="topbar-right">
      <div id="clock" title="昼夜"><iconify-icon icon="mdi:weather-sunny"></iconify-icon></div>
      <button class="icon-btn" id="btn-collapse-res" title="折叠资源"><iconify-icon icon="mdi:chevron-up"></iconify-icon></button>
      <button class="icon-btn" id="btn-pause" title="暂停"><iconify-icon icon="mdi:pause"></iconify-icon></button>
      <button class="icon-btn" id="btn-mute" title="音效开关"><iconify-icon icon="mdi:volume-high"></iconify-icon></button>

  <div id="save-panel" class="hidden">
    <div class="save-panel-inner">
      <div class="save-panel-title">
        <span><iconify-icon icon="mdi:content-save-all"></iconify-icon>存档 / 读档</span>

  <div id="prayers"></div>

<div class="lb top"></div><div class="lb bot"></div>

    <div class="intro-content" id="intro-content"></div>
  </div>
</div>

</div>

</div>

    <div class="pause-title">PAUSED</div>
    <button class="pause-link" data-pause="resume">继续游戏</button>
    <button class="pause-link" data-pause="save">存档 / 读档</button>
    <button class="pause-link" data-pause="quit">返回主菜单</button>
  </div>
</div>

<div class="overlay hidden" id="overlay-victory">

  <div id="v-stats"></div>
