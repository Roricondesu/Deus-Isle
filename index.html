<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>神明小岛 · Deus Isle</title>
<style>
  /* 注册阿里妈妈方圆体（可变字体） */
  @font-face {
    font-family: "Alimama FangYuanTi";
    src: url("/fonts/AlimamaFangYuanTi.ttf") format("truetype-variations");
    font-weight: 100 900;
    font-display: swap;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --font-ui: "Alimama FangYuanTi","PingFang SC","Microsoft YaHei",system-ui,-apple-system,sans-serif;
    --font-mono: "SF Mono","JetBrains Mono",Consolas,monospace;
    --glass: rgba(12,16,32,.55);
    --glass-border: rgba(255,255,255,.08);
    --touch-min: 44px;
  }
  html,body { width:100%; height:100%; overflow:hidden; background:#0a0e1a;
    font-family:var(--font-ui);
    font-variation-settings:"wght" 500, "CNTR" 0;
    user-select:none; -webkit-user-select:none; }
  /* 全局禁用滚动条 */
  * { scrollbar-width:none; -ms-overflow-style:none; }
  *::-webkit-scrollbar { width:0 !important; height:0 !important; display:none !important; }
  #stage { position:fixed; inset:0; }
  #stage canvas { display:block; }

  /* ---------- SVG 图标（iconify-icon Web Component） ---------- */
  iconify-icon {
    display:inline-flex;
    vertical-align:-0.125em;
    width:1em; height:1em;
    color:inherit;
    fill:currentColor;
    pointer-events:none;
  }
  #era-icon iconify-icon { width:22px; height:22px; filter:drop-shadow(0 0 6px rgba(255,220,120,.6)); }
  .res iconify-icon { width:16px; height:16px; }
  #clock iconify-icon { width:18px; height:18px; }
  .icon-btn iconify-icon { width:18px; height:18px; }
  .b-icon iconify-icon { width:22px; height:22px; }
  .god-btn b iconify-icon { width:18px; height:18px; }
  .act-btn iconify-icon, .big-btn iconify-icon { width:1.1em; height:1.1em; vertical-align:-0.18em; margin-right:4px; }
  .floater iconify-icon { width:1em; height:1em; }
  .toast iconify-icon { width:16px; height:16px; vertical-align:-0.15em; margin-right:6px; }
  .prayer iconify-icon { width:13px; height:13px; vertical-align:-0.15em; margin-right:4px; }
  #overlay-victory h1 iconify-icon, #overlay-intro h1 iconify-icon { width:1em; height:1em; vertical-align:-0.1em; margin-right:8px; }
  .tips iconify-icon { width:14px; height:14px; vertical-align:-0.15em; margin:0 4px; }
  /* 深色背景上的图标强制白色 */
  .b-icon { color:#fff; }
  .b-cost { color:#ffd98a; }
  #clock { color:#ffe9b0; }
  .icon-btn { color:#fff; }
  #btn-eraup { color:#1a1405; }
  #btn-eraup.small iconify-icon { color:#1a1405; }
  #btn-eraup.btn-launch { color:#fff !important; }

  /* ---------- HUD 通用 ---------- */
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; transition:opacity .4s; }
  #ui > * { pointer-events:auto; }
  #ui.ui-hidden { opacity:0; pointer-events:none; }
  #ui.ui-hidden > * { pointer-events:none; }
  .glass { background:var(--glass); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:none; border-radius:18px;
    box-shadow:0 8px 32px rgba(0,0,0,.35); }

  /* ---------- 顶栏 ---------- */
  #topbar {
    position:absolute; top:8px; left:8px; right:8px;
    display:flex; align-items:center; gap:6px;
    flex-wrap:wrap; justify-content:space-between;
    padding:0; pointer-events:none;
  }
  #topbar > * { pointer-events:auto; }
  #topbar-left { display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
  #topbar-right { display:flex; align-items:center; gap:6px; flex-wrap:wrap; justify-content:flex-end; }
  #era-badge { display:flex; align-items:center; gap:6px; padding:5px 10px; border-radius:999px;
    background:rgba(12,16,32,.5); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
  #era-icon { display:inline-flex; align-items:center; justify-content:center; width:24px; height:24px; color:#ffe9b0; }
  #era-name { color:#ffe9b0; font-weight:700; font-size:13px; letter-spacing:1px; white-space:nowrap; }
  #era-sub { color:rgba(255,255,255,.5); font-size:9px; letter-spacing:2px; }
  .res { display:flex; align-items:center; gap:4px; color:#fff; font-size:12px; font-weight:600;
    padding:5px 8px; border-radius:999px; background:rgba(12,16,32,.5);
    backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); white-space:nowrap; }
  .res span { min-width:20px; text-align:right; font-variant-numeric:tabular-nums; }
  .res.flash { animation:resFlash .5s; }
  @keyframes resFlash { 0%{ background:rgba(255,220,120,.55);} 100%{ background:rgba(12,16,32,.5);} }
  .crisis-banner { position:absolute; top:58px; left:50%; transform:translateX(-50%);
    padding:7px 16px; border-radius:999px; font-size:12px; font-weight:700; letter-spacing:1px;
    color:#fff; background:linear-gradient(90deg,#d04a3a,#c85a3a); box-shadow:0 0 18px rgba(208,74,58,.55);
    animation:crisisPulse 1.2s infinite; pointer-events:none; z-index:20; white-space:nowrap; }
  .crisis-banner.hidden { display:none; }
  @keyframes crisisPulse { 0%,100%{ box-shadow:0 0 12px rgba(208,74,58,.45);} 50%{ box-shadow:0 0 26px rgba(208,74,58,.95);} }
  #clock { display:inline-flex; align-items:center; justify-content:center; width:34px; height:34px;
    border-radius:999px; background:rgba(12,16,32,.5); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); }
  .icon-btn { width:34px; height:34px; border-radius:999px; border:none;
    background:rgba(12,16,32,.5); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    color:#fff; font-size:16px; cursor:pointer; transition:.2s;
    display:inline-flex; align-items:center; justify-content:center; }
  .icon-btn:hover { background:rgba(255,255,255,.18); transform:translateY(-1px); }

  /* ---------- 底栏 ---------- */
  #bottombar {
    position:absolute; left:8px; right:8px; bottom:8px;
    display:flex; gap:8px; align-items:flex-end;
    justify-content:space-between;
    pointer-events:none;
  }
  #bottombar > * { pointer-events:auto; }
  #build-dock { display:flex; gap:6px; padding:6px; align-items:center; overflow-x:auto;
    background:rgba(12,16,32,.5); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
    border-radius:16px; max-width:calc(100% - 124px); }
  #build-dock::-webkit-scrollbar { height:4px; }
  #build-dock::-webkit-scrollbar-thumb { background:rgba(255,255,255,.18); border-radius:2px; }
  .b-card { flex:0 0 auto; width:64px; min-height:70px; padding:7px 4px 6px; border-radius:12px; text-align:center; cursor:pointer;
    background:rgba(255,255,255,.08); border:none; transition:.18s; position:relative;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .b-card:hover { background:rgba(255,255,255,.16); transform:translateY(-3px); }
  .b-card.sel { background:rgba(120,200,255,.28); box-shadow:0 0 14px rgba(120,200,255,.5); }
  .b-card.poor { opacity:.38; filter:grayscale(.6); }
  .b-icon { font-size:22px; display:flex; align-items:center; justify-content:center; }
  .b-name { color:#fff; font-size:10px; font-weight:600; margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; width:100%; }
  .b-cost { color:#ffd98a; font-size:9px; margin-top:2px; white-space:nowrap; }
  #side-dock { display:flex; flex-direction:column; gap:6px; padding:0; width:116px; flex-shrink:0; }
  #god-dock { display:flex; gap:4px; flex-wrap:wrap; }
  .god-btn { flex:1 0 calc(33.33% - 3px); min-width:34px; min-height:var(--touch-min); padding:4px 1px; border-radius:10px; border:none;
    background:linear-gradient(160deg,rgba(120,80,220,.32),rgba(60,30,120,.32)); color:#e8dcff;
    font-size:9px; cursor:pointer; text-align:center; transition:.18s; position:relative; overflow:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .god-btn:hover:not(.cd):not(.poor) { transform:translateY(-2px); box-shadow:0 0 12px rgba(160,120,255,.5); }
  .god-btn.poor { opacity:.4; filter:grayscale(.7); cursor:not-allowed; }
  .god-btn.cd { cursor:not-allowed; }
  .god-btn .cdmask { position:absolute; inset:0; background:rgba(0,0,0,.55); transform-origin:bottom; }
  .god-btn b { display:flex; align-items:center; justify-content:center; font-size:15px; margin-bottom:1px; }
  .god-btn span { display:block; line-height:1.1; }
  .act-btn { border:none; border-radius:12px; padding:8px 6px; font-size:12px; font-weight:700; cursor:pointer;
    color:#1a1405; background:linear-gradient(135deg,#ffd76a,#ff9a3c); transition:.2s; letter-spacing:1px;
    display:flex; align-items:center; justify-content:center; flex-wrap:wrap; min-height:var(--touch-min); }
  .act-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 18px rgba(255,170,60,.45); }
  .act-btn:disabled { filter:grayscale(.85); opacity:.5; cursor:not-allowed; }
  #btn-eraup { background:linear-gradient(135deg,#8affc1,#3cd6a0); }
  #btn-eraup.ready { animation:pulseGlow 1.4s infinite; }
  #btn-eraup small { display:block; width:100%; font-size:8px; font-weight:500; opacity:.75; margin-top:2px; letter-spacing:0; }
  #btn-eraup small iconify-icon { width:12px; height:12px; vertical-align:-0.1em; margin:0 1px; }
  @keyframes pulseGlow { 0%,100%{ box-shadow:0 0 8px rgba(120,255,190,.4);} 50%{ box-shadow:0 0 24px rgba(120,255,190,.95);} }
  .btn-launch { background:linear-gradient(135deg,#ff8a8a,#d63c3c) !important; color:#fff !important; animation:pulseGlowR 1.2s infinite; }
  @keyframes pulseGlowR { 0%,100%{ box-shadow:0 0 10px rgba(255,100,100,.5);} 50%{ box-shadow:0 0 30px rgba(255,80,80,1);} }
  .big-btn { border:none; border-radius:16px; padding:14px 28px; font-size:16px; font-weight:700; cursor:pointer;
    color:#1a1405; background:linear-gradient(135deg,#ffd76a,#ff9a3c); transition:.2s; letter-spacing:2px;
    display:inline-flex; align-items:center; justify-content:center; min-height:var(--touch-min); }
  .big-btn:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(255,170,60,.45); }

  /* ---------- 提示/祈祷/飘字 ---------- */
  #toasts { position:absolute; top:64px; right:8px; display:flex; flex-direction:column; gap:6px; pointer-events:none !important; max-width:min(320px,70vw); }
  .toast { padding:9px 14px; border-radius:12px; color:#fff; font-size:12px; font-weight:600;
    background:rgba(15,20,40,.9); border:none; border-left:3px solid #ffd76a;
    animation:toastIn .4s cubic-bezier(.2,1.4,.4,1); box-shadow:0 6px 20px rgba(0,0,0,.4);
    display:flex; align-items:flex-start; gap:6px; line-height:1.4; }
  .toast.out { animation:toastOut .4s forwards; }
  @keyframes toastIn { from{ transform:translateX(120%); opacity:0;} to{ transform:none; opacity:1;} }
  @keyframes toastOut { to{ transform:translateX(120%); opacity:0;} }
  #prayers { position:absolute; inset:0; pointer-events:none !important; }
  .prayer { position:absolute; transform:translate(-50%,-110%); cursor:pointer; pointer-events:auto !important;
    background:linear-gradient(160deg,#fff8e8,#ffe9b8); color:#5a4410; font-size:12px; font-weight:700;
    padding:7px 12px; border-radius:14px; white-space:nowrap; animation:prayBob 2s ease-in-out infinite;
    box-shadow:0 4px 14px rgba(0,0,0,.3); border:none; display:inline-flex; align-items:center; }
  .prayer::after { content:""; position:absolute; left:50%; bottom:-7px; transform:translateX(-50%);
    border:7px solid transparent; border-top-color:#ffe9b8; border-bottom:none; }
  .prayer:hover { filter:brightness(1.1); }
  @keyframes prayBob { 0%,100%{ margin-top:0;} 50%{ margin-top:-7px;} }
  .floater { position:absolute; transform:translate(-50%,-50%); font-size:13px; font-weight:800; pointer-events:none !important;
    text-shadow:0 2px 4px rgba(0,0,0,.6); animation:floatUp 1.4s ease-out forwards;
    display:inline-flex; align-items:center; gap:2px; }
  @keyframes floatUp { 0%{ opacity:0; margin-top:6px;} 15%{ opacity:1;} 100%{ opacity:0; margin-top:-44px;} }

  /* ---------- 覆盖层 ---------- */
  .overlay { position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    flex-direction:column; background:radial-gradient(ellipse at center,rgba(10,14,30,.25),rgba(5,8,18,.55));
    transition:opacity .6s; }
  .overlay.hidden { opacity:0; pointer-events:none; }

  /* 初始主界面 */
  #overlay-intro { align-items:flex-start; justify-content:center; padding:0 8vw; }
  .intro-panel { display:flex; flex-direction:column; align-items:flex-start; max-width:min(520px,80vw); }
  .intro-panel > .intro-en,
  .intro-panel > .intro-zh { opacity:0; transform:translateX(-24px); animation:introIn .8s cubic-bezier(.2,.8,.2,1) forwards; }
  .intro-panel > .intro-en { animation-delay:.1s; }
  .intro-panel > .intro-zh { animation-delay:.25s; }
  @keyframes introIn { to { opacity:1; transform:translateX(0); } }
  /* 子视图切换动画 */
  #intro-content { opacity:1; transform:translateX(0); transition:opacity .18s ease, transform .18s ease; }
  #intro-content.intro-fade-out { opacity:0; transform:translateX(-12px); }
  #intro-content.intro-fade-in { opacity:1; transform:translateX(0); transition:opacity .32s ease, transform .32s cubic-bezier(.2,.8,.2,1); }
  .intro-en { font-size:clamp(32px,6vw,54px); color:#ffe9b0; letter-spacing:0.12em; font-weight:700;
    margin:0 0 6px; line-height:1; text-shadow:0 0 50px rgba(255,200,90,.6), 0 4px 0 rgba(120,70,0,.4); }
  .intro-zh { color:rgba(255,255,255,.7); font-size:clamp(14px,2.2vw,18px); letter-spacing:0.6em; font-weight:500;
    margin-bottom:48px; text-shadow:0 0 18px rgba(120,200,255,.45); }
  .intro-menu { display:flex; flex-direction:column; align-items:flex-start; gap:6px; }
  .intro-link { background:none; border:none; cursor:pointer; padding:10px 4px;
    color:rgba(255,255,255,.85); font-family:inherit; font-size:clamp(18px,2.4vw,22px);
    font-weight:400; letter-spacing:0.15em; transition:all .25s; text-align:left;
    text-shadow:0 2px 8px rgba(0,0,0,.5); min-height:var(--touch-min); }
  .intro-link:hover { color:#fff; transform:translateX(8px); text-shadow:0 2px 12px rgba(255,255,255,.4); }
  .intro-link::before { content:""; display:inline-block; width:0; height:1px; margin-right:0;
    background:#fff; vertical-align:middle; transition:all .25s; }
  .intro-link:hover::before { width:18px; margin-right:10px; }
  /* 子视图：存档列表 / 设置 / 关于 */
  .intro-section-title { color:rgba(255,255,255,.5); font-size:13px; letter-spacing:0.4em;
    font-weight:500; margin-bottom:18px; }
  .intro-slot { display:flex; align-items:center; justify-content:space-between; gap:16px;
    padding:8px 4px; border-bottom:1px solid rgba(255,255,255,.08); min-width:280px; }
  .intro-slot-info { color:rgba(255,255,255,.85); font-size:15px; letter-spacing:0.05em; line-height:1.5; }
  .intro-slot-info small { display:block; color:rgba(255,255,255,.4); font-size:11px; margin-top:2px; letter-spacing:0.1em; }
  .intro-slot-actions { display:flex; gap:12px; flex-shrink:0; }
  .intro-mini { background:none; border:none; cursor:pointer; padding:4px 6px;
    color:rgba(255,255,255,.6); font-family:inherit; font-size:13px; letter-spacing:0.1em;
    transition:color .2s; min-height:var(--touch-min); }
  .intro-mini:hover { color:#fff; }
  .intro-mini.danger:hover { color:#ff8888; }
  .intro-row { display:flex; align-items:center; justify-content:space-between; gap:24px;
    padding:12px 4px; border-bottom:1px solid rgba(255,255,255,.08); min-width:300px; }
  .intro-row-label { color:rgba(255,255,255,.85); font-size:15px; letter-spacing:0.1em; }
  .intro-toggle { background:none; border:none; cursor:pointer; padding:4px 6px;
    color:rgba(255,255,255,.6); font-family:inherit; font-size:14px; letter-spacing:0.2em;
    transition:color .2s; min-height:var(--touch-min); }
  .intro-toggle.on { color:#fff; }
  .intro-about { color:rgba(255,255,255,.7); font-size:14px; line-height:2.1; letter-spacing:0.08em;
    max-width:380px; }
  .intro-about p { margin:0 0 14px; }
  .intro-about .ver { color:rgba(255,255,255,.4); font-size:11px; letter-spacing:0.3em; margin-top:24px; }
  .intro-back { margin-top:32px; }

  #overlay-era { pointer-events:none; background:radial-gradient(ellipse at center,rgba(20,26,50,.25),rgba(5,8,18,.75)); }
  #era-anim { text-align:center; opacity:0; }
  #era-anim.show { animation:eraTitle 3.4s cubic-bezier(.2,.8,.2,1) forwards; }
  @keyframes eraTitle { 0%{ opacity:0; transform:scale(1.6); letter-spacing:60px; filter:blur(12px);}
    18%{ opacity:1; transform:scale(1); filter:blur(0);} 80%{ opacity:1;} 100%{ opacity:0; transform:scale(.94);} }
  #era-anim-title { font-size:min(72px,12vw); font-weight:900; color:#fff; letter-spacing:22px;
    text-shadow:0 0 60px rgba(140,200,255,.9); }
  #era-anim-sub { font-size:16px; color:#9fd0ff; letter-spacing:10px; margin-top:14px; }

  /* 存档/读档面板 */
  #save-panel { position:fixed; inset:0; background:rgba(8,14,30,.65); backdrop-filter:blur(8px);
    z-index:60; display:flex; align-items:flex-end; justify-content:center; }
  #save-panel.hidden { display:none; }
  .save-panel-inner { width:min(560px,100vw); background:rgba(28,38,68,.96); border:none;
    border-radius:20px 20px 0 0; padding:20px 16px 24px; box-shadow:0 -8px 40px rgba(0,0,0,.5); }
  .save-panel-title { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;
    font-size:17px; letter-spacing:3px; color:#cfe2ff; font-weight:700; }
  .save-panel-title iconify-icon { color:#8ad0ff; margin-right:8px; vertical-align:-0.15em; }
  #save-slots { display:flex; flex-direction:column; gap:10px; }
  .save-slot { display:flex; align-items:center; justify-content:space-between; gap:14px;
    padding:12px 14px; background:rgba(20,28,50,.6); border:none;
    border-radius:12px; transition:all .2s; }
  .save-slot:hover { background:rgba(30,42,72,.8); }
  .save-slot-info { flex:1; min-width:0; }
  .save-slot-name { font-size:15px; color:#e8f0ff; font-weight:600; letter-spacing:1px; }
  .save-slot-meta { font-size:11px; color:rgba(200,220,255,.55); margin-top:4px; letter-spacing:.5px; }
  .save-slot-meta iconify-icon { width:11px; height:11px; vertical-align:-0.1em; margin-right:2px; }
  .save-slot.empty .save-slot-name { color:rgba(200,220,255,.35); }
  .save-slot-actions { display:flex; gap:8px; }
  .save-slot-btn { padding:7px 12px; font-size:12px; border-radius:8px; border:none; cursor:pointer;
    font-family:inherit; letter-spacing:1px; transition:all .15s; min-height:var(--touch-min); }
  .save-slot-btn.save { background:linear-gradient(135deg,#8affc1,#3cd6a0); color:#0a2014; font-weight:600; }
  .save-slot-btn.save:hover { transform:translateY(-1px); box-shadow:0 4px 12px rgba(60,214,160,.4); }
  .save-slot-btn.load { background:rgba(140,200,255,.18); color:#cfe2ff; }
  .save-slot-btn.load:hover { background:rgba(140,200,255,.32); }
  .save-slot-btn.delete { background:transparent; color:rgba(255,140,140,.7); }
  .save-slot-btn.delete:hover { background:rgba(255,140,140,.15); color:#ffaaaa; }
  .save-slot-btn:disabled { opacity:.35; cursor:not-allowed; }
  .save-hint { margin-top:14px; font-size:11px; color:rgba(200,220,255,.45); letter-spacing:.5px; text-align:center; }

  #overlay-victory h1 { font-size:min(52px,9vw); color:#ffd0d0; letter-spacing:10px; font-weight:900;
    text-shadow:0 0 50px rgba(255,120,120,.8); display:flex; align-items:center; }
  #v-stats { display:flex; gap:26px; margin:30px 0 34px; flex-wrap:wrap; justify-content:center; }
  .v-stat { text-align:center; } .v-stat b { display:block; font-size:34px; color:#ffe9b0; }
  .v-stat span { color:rgba(255,255,255,.55); font-size:12px; letter-spacing:2px; }

  /* ---------- 中间任务清单 / 技能条 ---------- */
  #skill-bar { position:absolute; top:90px; left:50%; transform:translateX(-50%); display:flex; gap:6px; flex-wrap:wrap; justify-content:center; max-width:min(520px,92vw); pointer-events:none; z-index:12; }
  .skill-chip { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:999px; background:rgba(12,16,32,.5); backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); color:#ffe9b0; font-size:10px; font-weight:600; pointer-events:auto; }
  .skill-chip iconify-icon { width:12px; height:12px; }
  #task-panel { position:absolute; top:116px; left:50%; transform:translateX(-50%); width:min(420px,92vw); max-height:min(240px,38vh); overflow-y:auto; padding:12px 14px; pointer-events:auto; z-index:12; }
  #task-panel .task-head { display:flex; align-items:center; gap:6px; color:#ffe9b0; font-size:13px; font-weight:700; letter-spacing:2px; margin-bottom:8px; }
  #task-panel .task-head iconify-icon { width:16px; height:16px; }
  #task-panel .task-list { display:flex; flex-direction:column; gap:6px; }
  .task-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border-radius:10px; background:rgba(255,255,255,.06); color:#fff; font-size:12px; transition:.2s; }
  .task-item.done { opacity:.55; }
  .task-item.done .task-text { text-decoration:line-through; color:rgba(255,255,255,.6); }
  .task-icon { color:#8ad0ff; font-size:16px; display:flex; }
  .task-icon iconify-icon { width:16px; height:16px; }
  .task-text { flex:1; }
  .task-check { margin-left:auto; color:#5affa0; font-size:16px; display:flex; }
  .task-check iconify-icon { width:16px; height:16px; }
  .task-empty { color:rgba(255,255,255,.45); text-align:center; font-size:12px; padding:8px; }

  /* ---------- 技能选择覆盖层 ---------- */
  #overlay-skill { pointer-events:auto; z-index:60; background:radial-gradient(ellipse at center,rgba(12,16,36,.85),rgba(5,8,18,.95)); }
  #overlay-skill .skill-title { color:#ffe9b0; font-size:clamp(20px,4vw,30px); font-weight:700; letter-spacing:4px; margin-bottom:24px; text-align:center; }
  #overlay-skill .skill-title iconify-icon { width:1em; height:1em; vertical-align:-0.12em; margin-right:8px; }
  #skill-grid { display:flex; gap:14px; justify-content:center; flex-wrap:wrap; max-width:min(900px,94vw); }
  .skill-card { width:min(260px,90vw); padding:18px; border-radius:18px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.1); cursor:pointer; transition:.2s; color:#fff; text-align:center; }
  .skill-card:hover { transform:translateY(-4px); background:rgba(255,255,255,.14); box-shadow:0 8px 24px rgba(120,200,255,.25); }
  .skill-card .skill-icon { font-size:42px; color:#8ad0ff; margin-bottom:10px; display:flex; justify-content:center; }
  .skill-card .skill-icon iconify-icon { width:42px; height:42px; }
  .skill-card .skill-name { font-size:18px; font-weight:700; color:#ffe9b0; margin-bottom:6px; }
  .skill-card .skill-desc { font-size:13px; color:rgba(255,255,255,.7); line-height:1.5; }

  /* 电影黑边 */
  .lb { position:fixed; left:0; right:0; height:0; background:#000; z-index:40; transition:height .9s cubic-bezier(.6,0,.3,1); }
  .lb.top { top:0; } .lb.bot { bottom:0; }
  body.cine .lb { height:9vh; }

  /* ---------- 移动端适配 ---------- */
  @media (min-width:641px) {
    #save-panel { align-items:center; }
    .save-panel-inner { border-radius:20px; padding:24px; }
  }
  @media (max-width:640px) {
    #topbar { top:6px; left:6px; right:6px; gap:4px; }
    #topbar-left, #topbar-right { gap:4px; }
    #era-badge { padding:4px 8px; }
    #era-name { font-size:11px; }
    #era-sub { display:none; }
    .res { font-size:10px; padding:4px 6px; }
    .res span { min-width:16px; }
    .crisis-banner { top:50px; font-size:11px; padding:6px 12px; }
    #skill-bar { top:78px; }
    #task-panel { top:102px; width:min(420px,96vw); padding:10px 12px; }
    #toasts { top:58px; right:6px; gap:5px; }
    .toast { font-size:11px; padding:8px 12px; }
    #bottombar { left:6px; right:6px; bottom:6px; gap:6px; }
    #build-dock { max-width:calc(100% - 104px); padding:5px; gap:5px; border-radius:14px; }
    .b-card { width:58px; min-height:64px; border-radius:10px; }
    .b-icon { font-size:20px; }
    .b-name { font-size:9px; }
    #side-dock { width:96px; gap:5px; }
    .god-btn { min-height:38px; font-size:8px; }
    .god-btn b { font-size:13px; }
    .act-btn { font-size:11px; padding:6px 4px; min-height:40px; }
    #overlay-intro { align-items:center; padding:0 6vw; text-align:center; }
    .intro-panel { align-items:center; max-width:92vw; }
    .intro-menu { align-items:center; }
    .intro-link { text-align:center; font-size:20px; padding:12px 8px; }
    .intro-link:hover { transform:none; }
    .intro-link::before { display:none; }
    .intro-en { font-size:clamp(36px,11vw,56px); letter-spacing:0.08em; }
    .intro-zh { font-size:14px; letter-spacing:0.4em; margin-bottom:36px; }
    .intro-slot, .intro-row { min-width:auto; width:100%; }
    .intro-slot { flex-direction:column; align-items:flex-start; gap:10px; }
    .intro-slot-actions { width:100%; justify-content:flex-end; }
    #overlay-victory { padding:0 6vw; text-align:center; }
    #v-stats { gap:16px; }
    .v-stat b { font-size:26px; }
  }
  @media (max-width:400px) {
    .res { padding:3px 5px; }
    .res iconify-icon { width:14px; height:14px; }
    #build-dock { max-width:calc(100% - 96px); }
    .b-card { width:52px; min-height:58px; }
    #side-dock { width:88px; }
    .act-btn { font-size:10px; }
  }
  @media (max-height:560px) {
    #overlay-intro { justify-content:flex-start; padding-top:5vh; }
    .intro-zh { margin-bottom:24px; }
    .intro-back { margin-top:18px; }
    #topbar-left .res:nth-child(n+5) { display:none; }
  }

  /* 可变字体粗细辅助类 */
  .w-bold { font-variation-settings:"wght" 800; }
  .w-black { font-variation-settings:"wght" 900; }
</style>
<script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
</head>
<body>
<div id="stage"></div>

<div id="ui">
  <div id="topbar">
    <div id="topbar-left">
      <div id="era-badge">
        <span id="era-icon"><iconify-icon icon="mdi:fire"></iconify-icon></span>
        <div><div id="era-name">远古时期</div><div id="era-sub">第 1 纪元</div></div>
      </div>
      <div class="res" title="食物"><iconify-icon icon="mdi:wheat"></iconify-icon><span id="r-food">0</span></div>
      <div class="res" title="木材"><iconify-icon icon="ph:tree-fill"></iconify-icon><span id="r-wood">0</span></div>
      <div class="res" title="金币"><iconify-icon icon="mdi:circle-multiple"></iconify-icon><span id="r-gold">0</span></div>
      <div class="res" title="信仰"><iconify-icon icon="mdi:star-shooting"></iconify-icon><span id="r-faith">0</span></div>
      <div class="res" title="人口 / 容量"><iconify-icon icon="mdi:account-group"></iconify-icon><span id="r-pop">0/0</span></div>
      <div class="res" title="幸福度"><iconify-icon icon="mdi:emoticon-happy"></iconify-icon><span id="r-happy">0</span></div>
    </div>
    <div id="topbar-right">
      <div id="clock" title="昼夜"><iconify-icon icon="mdi:weather-sunny"></iconify-icon></div>
      <button class="icon-btn" id="btn-mute" title="音效开关"><iconify-icon icon="mdi:volume-high"></iconify-icon></button>
      <button class="icon-btn" id="btn-save" title="存档/读档"><iconify-icon icon="mdi:content-save-all"></iconify-icon></button>
      <button class="icon-btn" id="btn-reset" title="重置存档"><iconify-icon icon="mdi:reload"></iconify-icon></button>
    </div>
  </div>

  <!-- 危机警告横幅 -->
  <div id="crisis-banner" class="crisis-banner hidden"></div>

  <!-- 已学技能条 -->
  <div id="skill-bar"></div>

  <!-- 任务清单 -->
  <div id="task-panel" class="glass"></div>

  <!-- 存档/读档面板 -->
  <div id="save-panel" class="hidden">
    <div class="save-panel-inner">
      <div class="save-panel-title">
        <span><iconify-icon icon="mdi:content-save-all"></iconify-icon> 存档 / 读档</span>
        <button id="save-panel-close" class="icon-btn"><iconify-icon icon="mdi:close"></iconify-icon></button>
      </div>
      <div id="save-slots"></div>
      <div class="save-hint">自动存档会在每次操作后更新；手动档可保存 3 个独立进度。</div>
    </div>
  </div>

  <div id="toasts"></div>
  <div id="prayers"></div>

  <div id="bottombar">
    <div id="build-dock"></div>
    <div id="side-dock">
      <div id="god-dock"></div>
      <button class="act-btn" id="btn-expand"><iconify-icon icon="mdi:island"></iconify-icon>填海扩岛</button>
      <button class="act-btn" id="btn-eraup" disabled><iconify-icon icon="mdi:arrow-up-bold"></iconify-icon>时代跃迁</button>
    </div>
  </div>
</div>

<div class="lb top"></div><div class="lb bot"></div>

<div class="overlay" id="overlay-intro">
  <div class="intro-panel">
    <h1 class="intro-en">DEUS ISLE</h1>
    <div class="intro-zh">神明小岛</div>
    <div class="intro-content" id="intro-content"></div>
  </div>
</div>

<div class="overlay hidden" id="overlay-era">
  <div id="era-anim"><div id="era-anim-title"></div><div id="era-anim-sub"></div></div>
</div>

<div class="overlay hidden" id="overlay-skill">
  <div class="skill-title"><iconify-icon icon="mdi:star-shooting"></iconify-icon>选择本纪元技能</div>
  <div id="skill-grid"></div>
</div>

<div class="overlay hidden" id="overlay-victory">
  <h1><iconify-icon icon="mdi:rocket"></iconify-icon>文明起航</h1>
  <div class="desc" style="color:rgba(255,255,255,.8);margin-top:14px;">整座小岛化作方舟，载着你的孩子驶向群星。<br>从一堆篝火到一艘星舰——这是属于你的一文明史。</div>
  <div id="v-stats"></div>
  <button class="big-btn" id="btn-again"><iconify-icon icon="mdi:sprout"></iconify-icon>再育一代文明</button>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
